      function bindDetailButtons(svc) {
        const save = document.getElementById('detailSaveBtn');
        const contact = document.getElementById('detailContactBtn');
        const like = document.getElementById('detailLikeBtn');
        if (save) save.addEventListener('click', () => saveServiceById(svc.id).then(() => showToast('Saved for later', 'success')));
        if (contact) {
          contact.addEventListener('click', () => {
            if (userIsPureProvider()) {
              showToast('Provider accounts can browse and save. Contact requests are for customers.', 'info');
              return;
            }
            customerHasLocation().then(hasLocation => {
              if (!hasLocation) showLocationPromptInline();
              else openBudgetSheet(svc);
            });
          });
        }
        if (like) {
          like.addEventListener('click', () => {
            if (userIsPureProvider()) {
              saveServiceById(svc.id).then(() => showToast('Saved. Contact requests are for customers.', 'success'));
              return;
            }
            fetchApi('/swipe/like/', { method: 'POST', body: JSON.stringify({ service_id: svc.id }) })
              .then(res => {
                if (res.provider_protection) state.usageInfo = res.provider_protection;
                if (res.success) {
                  const cr = res.contact_request || {};
                  updateDetailContactStatus(cr.status || 'approved');
                  showContactResultToast({ status: cr.status || 'approved' });
                } else if (res.provider_protection) {
                  showUsageLimitModal(res.provider_protection);
                } else {
                  showToast(res.error || 'Failed to like', 'error');
                }
              });
          });
        }
      }

      function openBudgetSheet(svc) {
        closeBudgetSheet();
        const backdrop = document.createElement('div');
        backdrop.id = 'budgetSheetBackdrop';
        backdrop.className = 'sheet-backdrop';
        backdrop.innerHTML = `
          <div class="sheet glass" role="dialog" aria-modal="true">
            <h3>Set your budget</h3>
            <div class="sheet-copy">Add a minimum budget before sending the contact request.</div>
            <label class="budget-field-label" for="budgetInput">Budget in ETB</label>
            <input class="budget-input" id="budgetInput" type="number" min="1000" step="50" inputmode="numeric" value="1000">
            <div class="budget-average" id="budgetAverage">Loading average prices...</div>
            <div class="budget-error" id="budgetError"></div>
            <div class="sheet-actions">
              <button class="btn-outline" id="budgetCancelBtn" type="button">Cancel</button>
              <button class="btn-outline primary" id="budgetConfirmBtn" type="button">Contact</button>
            </div>
          </div>
        `;
        document.body.appendChild(backdrop);
        requestAnimationFrame(() => backdrop.classList.add('show'));
        backdrop.addEventListener('click', event => { if (event.target === backdrop) closeBudgetSheet(); });
        document.getElementById('budgetCancelBtn').addEventListener('click', closeBudgetSheet);
        const avg = document.getElementById('budgetAverage');
        const categoryId = svc.category ? svc.category.id : null;
        if (categoryId) {
          fetchApi('/services/category-avg-price/?category_id=' + encodeURIComponent(categoryId))
            .then(res => {
              if (avg) avg.textContent = renderAverageLine(svc, res.success ? (res.averages || {}) : {}, false);
            })
            .catch(() => { if (avg) avg.textContent = renderAverageLine(svc, {}, false); });
        } else if (avg) {
          avg.textContent = renderAverageLine(svc, {}, false);
        }
        document.getElementById('budgetConfirmBtn').addEventListener('click', () => {
          const input = document.getElementById('budgetInput');
          const error = document.getElementById('budgetError');
          const budget = Number(input.value || 0);
          if (budget < 1000) {
            error.textContent = 'Minimum budget is 1000 ETB.';
            input.focus();
            return;
          }
          error.textContent = '';
          submitContactRequest(svc);
        });
        const input = document.getElementById('budgetInput');
        input.focus();
        input.select();
      }

      function closeBudgetSheet() {
        const backdrop = document.getElementById('budgetSheetBackdrop');
        if (!backdrop) return;
        backdrop.classList.remove('show');
        setTimeout(() => backdrop.remove(), 180);
      }

      function renderAverageLine(svc, averages, loading) {
        if (loading) return 'Loading average prices...';
        const categoryName = svc.category ? svc.category.name : 'this service';
        return 'Average for ' + categoryName + ': '
          + (averages.half_day || '-') + ' / '
          + (averages.full_day || '-') + ' / '
          + (averages.night || '-') + ' ETB.';
      }

      function submitContactRequest(svc) {
        return fetchApi('/contact-request/', { method: 'POST', body: JSON.stringify({ service_id: svc.id }) })
          .then(res => {
            if (res.success) {
              closeBudgetSheet();
              const cr = res.contact_request || {};
              updateDetailContactStatus(cr.status);
              showToast('Contact request sent', 'success');
            } else if (res.error === 'LOCATION_REQUIRED') {
              closeBudgetSheet();
              showLocationPromptInline();
            } else {
              showToast(res.error || 'Request failed', 'error');
            }
          });
      }

      function customerHasLocation() {
        return fetchApi('/me/')
          .then(res => {
            if (res.success && res.user) {
              state.user = res.user;
              return Boolean(res.user.has_customer_location);
            }
            return Boolean(state.user && state.user.has_customer_location);
          })
          .catch(() => Boolean(state.user && state.user.has_customer_location));
      }

      function showLocationPromptInline() {
        const container = document.getElementById('detailContactStatus');
        if (!container) return;
        const deepLink = getBotDeepLink('share_location');
        container.innerHTML = `
          <div class="location-inline-prompt">
            <div>Share your GPS location to contact nearby providers.</div>
            <button class="btn-primary" type="button" id="detailLocationBtn">Share GPS Location</button>
            ${deepLink ? `<div style="margin-top:8px"><a href="${escAttr(deepLink)}" target="_blank" rel="noopener">Or open the bot to share</a></div>` : ''}
            <div id="locationError" class="budget-error"></div>
          </div>
        `;
        document.getElementById('detailLocationBtn').addEventListener('click', requestLocationFromMiniApp);
      }

      function requestLocationFromMiniApp() {
        requestLocationFromMiniAppAsync().then(result => {
          if (result) sendCustomerLocation(result.latitude, result.longitude);
          else showToast('Location was not shared', 'error');
        });
      }

      function requestLocationFromMiniAppAsync() {
        return new Promise(resolve => {
          if (tg && typeof tg.requestLocation === 'function') {
            tg.onEvent('locationRequested', function onLocation(result) {
              tg.offEvent('locationRequested', onLocation);
              if (result && result.latitude && result.longitude) resolve({ latitude: result.latitude, longitude: result.longitude });
              else resolve(null);
            });
            tg.requestLocation();
          } else if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              pos => resolve({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
              () => resolve(null),
              { enableHighAccuracy: true, timeout: 10000 }
            );
          } else {
            resolve(null);
          }
        });
      }

      function sendCustomerLocation(lat, lon) {
        const errorEl = document.getElementById('locationError');
        return fetchApi('/profile/customer-location/', {
          method: 'PATCH',
          body: JSON.stringify({ latitude: lat, longitude: lon }),
        }).then(res => {
          if (res.success) {
            state.user = state.user || {};
            state.user.has_customer_location = true;
            showToast('Location saved', 'success');
            if (state.screen === 'swipe') loadSwipeServices(true);
            const status = document.getElementById('detailContactStatus');
            if (status) status.innerHTML = '<div class="detail-contact-status approved">Location saved. You can now contact providers.</div>';
            return true;
          }
          if (errorEl) errorEl.textContent = res.errors ? JSON.stringify(res.errors) : 'Failed to save location.';
          return false;
        }).catch(() => {
          if (errorEl) errorEl.textContent = 'Network error. Try again.';
          return false;
        });
      }

      function contactStatusLabel(status) {
        switch (status) {
          case 'provider_pending':
            return { cls: 'provider', label: 'Waiting for provider response.' };
          case 'pending':
            return { cls: 'pending', label: 'Admin review in progress.' };
          case 'approved':
          case 'auto_approved':
            return { cls: 'approved', label: 'Approved. Contact details are sent through the bot.' };
          case 'rejected':
          case 'provider_rejected':
            return { cls: 'rejected', label: 'Not available. Try another provider.' };
          default:
            return { cls: '', label: '' };
        }
      }

      function renderContactStatusRow(contactStatus) {
        if (!contactStatus) return '';
        const status = contactStatusLabel(contactStatus.status);
        if (!status.label) return '';
        return '<div class="contact-status-row ' + status.cls + '">' + escHtml(status.label) + '</div>';
      }

      function loadDetailContactStatus(serviceId) {
        fetchApi('/contact-request/status/?service_id=' + encodeURIComponent(serviceId))
          .then(res => {
            if (res.success && res.contact_request) {
              updateDetailContactStatus(res.contact_request.status);
            }
          })
          .catch(() => {});
      }

      function updateDetailContactStatus(status) {
        const container = document.getElementById('detailContactStatus');
        if (!container) return;
        const contactStatus = contactStatusLabel(status);
        if (contactStatus.label) container.innerHTML = '<div class="detail-contact-status ' + contactStatus.cls + '">' + escHtml(contactStatus.label) + '</div>';
      }

      function showContactResultToast(cr) {
        switch (cr.status) {
          case 'provider_pending':
            showToast('Request sent. Waiting for provider response.', 'success');
            break;
          case 'approved':
          case 'auto_approved':
            showToast('Contact approved', 'success');
            break;
          case 'rejected':
          case 'provider_rejected':
            showToast('Provider is not available', 'error');
            break;
          default:
            showToast('Request sent', 'success');
        }
      }

      function serviceIsVerified(svc) {
        return Boolean(svc && (svc.is_verified || svc.provider_is_verified));
      }

      function serviceIsTested(svc) {
        return Boolean(svc && (svc.admin_tested_badge || svc.provider_admin_tested_badge));
      }

        state.screen = 'my_service';
        renderPhone(`
          ${renderSubtop('My Service', userCanManageService() ? 'Provider' : 'Customer', 'home')}
          <div id="myServiceContent">
            <div class="empty-state"><div class="spinner"></div><p>Loading your service...</p></div>
          </div>
        `, 'my_service');

      function updateProfileVisibility(nextStatus) {
        const toggle = document.getElementById('visibilityToggleBtn');

          method: 'POST',
          body: JSON.stringify({ visibility_status: nextStatus }),

          .then(res => {
            if (res.success) {
              showToast('Visibility updated', 'success');
              loadMyService();
            } else {
              showToast(res.error || 'Failed to update visibility', 'error');
            }
          })
          .catch(() => showToast('Network error', 'error'))
          .finally(() => { if (toggle) toggle.disabled = false; });
      }

      function deleteMyService() {
        if (!window.confirm('Are you sure you want to delete your service? This will change your account to a customer. This cannot be undone.')) return;
        const btn = document.getElementById('deleteServiceBtn');
        if (btn) btn.disabled = true;
        fetchApi('/service/me/delete/', { method: 'DELETE' })
          .then(res => {
            if (res.success) {
              showToast('Service deleted', 'success');
              state.myService = null;
              if (state.user) state.user.role = 'customer';
              navigate('home');
            } else {
              showToast(res.error || 'Failed to delete service', 'error');
            }
          })
          .catch(() => showToast('Network error', 'error'))
          .finally(() => { if (btn) btn.disabled = false; });
      }

      function timeAgo(dateStr) {
        if (!dateStr) return '-';
        const diff = Date.now() - new Date(dateStr).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'just now';
        if (mins < 60) return mins + 'm ago';
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h ago';
        const days = Math.floor(hrs / 24);
        if (days < 30) return days + 'd ago';
        return new Date(dateStr).toLocaleDateString();
      }

      function renderUsageBar(usage) {
        const el = document.getElementById('usageBar');
        if (!el) return;
        if (!usage) {
          el.innerHTML = '';
          el.style.display = 'none';
          return;
        }
        const today = usage.requests_today || 0;
        const daily = usage.daily_hard_limit || Infinity;
        const weekly = usage.weekly_requests || 0;
        const weeklyCap = usage.weekly_hard_limit || Infinity;
        const retry = usage.retry_after_seconds || 0;
        const pct = Math.min(today / Math.max(daily, 1), 1);
        const dotClass = pct >= 1 ? 'red' : pct >= 0.75 ? 'amber' : 'green';
        el.style.display = 'flex';
        el.innerHTML =
          '<span class="usage-dot ' + dotClass + '"></span>'
          + '<div class="usage-left">'
          + '<span class="usage-stat' + (today >= daily ? ' danger' : today >= daily * 0.75 ? ' warn' : '') + '">' + today + '/' + daily + ' today</span>'
          + '<span class="usage-stat' + (weekly >= weeklyCap ? ' danger' : '') + '">' + weekly + '/' + (weeklyCap === Infinity ? 'inf' : weeklyCap) + ' week</span>'
          + '</div>'
          + (retry > 0 ? '<span class="usage-countdown" data-retry="' + retry + '" data-ts="' + Date.now() + '">' + formatCountdown(retry) + '</span>' : '');
        if (retry > 0) startCountdownTicker(el);
      }

      function formatCountdown(sec) {
        if (sec <= 0) return '';
        if (sec < 60) return sec + 's';
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return m + ':' + (s < 10 ? '0' : '') + s;
      }

      function startCountdownTicker(container) {
        if (container._countdownTimer) return;
        container._countdownTimer = setInterval(() => {
          const el = container.querySelector('.usage-countdown');
          if (!el) {
            clearInterval(container._countdownTimer);
            container._countdownTimer = null;
            return;
          }
          const elapsed = Math.floor((Date.now() - parseInt(el.dataset.ts, 10)) / 1000);
          const remaining = Math.max(0, parseInt(el.dataset.retry, 10) - elapsed);
          el.textContent = remaining <= 0 ? 'now' : formatCountdown(remaining);
          if (remaining <= 0) {
            clearInterval(container._countdownTimer);
            container._countdownTimer = null;
          }
        }, 1000);
      }

      function showUsageLimitModal(usage) {
        const backdrop = document.getElementById('usageModalBackdrop');
        if (!backdrop || !usage) return;
        const titleEl = document.getElementById('usageModalTitle');
        const subEl = document.getElementById('usageModalSub');
        const detailsEl = document.getElementById('usageModalDetails');
        const today = usage.requests_today || 0;
        const daily = usage.daily_hard_limit || Infinity;
        const weekly = usage.weekly_requests || 0;
        const weeklyCap = usage.weekly_hard_limit || Infinity;
        const retry = usage.retry_after_seconds || 0;
        if (usage.protection_level === 'weekly_lock') {
          titleEl.textContent = 'Weekly Limit Reached';
          subEl.textContent = "You've used all available contact requests for this week.";
        } else if (today >= daily) {
          titleEl.textContent = 'Daily Limit Reached';
          subEl.textContent = "You've hit the maximum daily contact requests. Check back tomorrow.";
        } else if (retry > 0) {
          titleEl.textContent = 'Cooldown Active';
          subEl.textContent = 'Take a short break between contact requests.';
        } else {
          titleEl.textContent = 'Contact Limit Reached';
          subEl.textContent = usage.message || '';
        }
        detailsEl.innerHTML =
          '<div class="usage-detail-row"><span class="usage-detail-label">Today</span><span class="usage-detail-value">' + today + ' / ' + daily + '</span></div>'
          + '<div class="usage-detail-row"><span class="usage-detail-label">This Week</span><span class="usage-detail-value">' + weekly + ' / ' + (weeklyCap === Infinity ? 'inf' : weeklyCap) + '</span></div>'
          + (retry > 0 ? '<div class="usage-countdown-large" id="modalCountdown">' + formatCountdown(retry) + '</div><div class="usage-countdown-label">until next request</div>' : '');
        backdrop.classList.add('show');
      }

      function closeUsageLimitModal(event) {
        if (event && event.target !== event.currentTarget) return;
        const backdrop = document.getElementById('usageModalBackdrop');
        if (backdrop) backdrop.classList.remove('show');
      }

      function navigate(screen) {
        state._prevScreen = state.screen || 'home';
        switch (screen) {
          case 'home':
            renderHome();
            break;
          case 'swipe':
          case 'discover':
            renderSwipe();
            break;
          case 'saved':
            renderSaved();
            break;
          case 'my_service':
          case 'myservice':
            renderMyService();
            break;
          default:
            renderHome();
        }
      }

      async function init() {
        renderLoading();
        const initData = tg ? tg.initData : null;
        if (!initData) {
          renderError('This app must be opened from Telegram.');
          return;
        }

        const authRes = await fetchApi('/auth/telegram/', {
          method: 'POST',
          body: JSON.stringify({ init_data: initData }),
        });
        if (!authRes.success) {
          renderError(authRes.error || 'Authentication failed.');
          return;
        }

        state.token = authRes.token;
        state.user = authRes.user;

        const meRes = await fetchApi('/me/');
        if (meRes.success && meRes.user) state.user = meRes.user;

        if (!state.user.policy_accepted_at) {
          renderPolicyGate();
          return;
        }

        const catRes = await fetchApi('/services/categories/');
        if (catRes.success && catRes.categories) state.categories = catRes.categories;

        if (!state.user.has_customer_location) {
          const loc = await requestLocationFromMiniAppAsync();
          if (loc) await sendCustomerLocation(loc.latitude, loc.longitude);
        }

        const categoryParam = parseInt(qs('category_id'), 10);
        if (categoryParam > 0) state.filters.category_id = categoryParam;

        const validScreens = {
          'my-service': 'my_service',
          'my_service': 'my_service',
          'saved': 'saved',
          'discovery': 'swipe',
          'discover': 'swipe',
          'swipe': 'swipe',
          'home': 'home',
        };
        navigate(validScreens[qs('screen') || 'home'] || 'home');
      }

      document.getElementById('usageModalBackdrop').addEventListener('click', closeUsageLimitModal);
      document.getElementById('usageModalCloseBtn').addEventListener('click', closeUsageLimitModal);

      window.app = {
        navigate,
        loadSwipeServices,
        showCardDetail,
        markImageFailed,
        onPhotoLoaded,
        state,
      };

      document.addEventListener('DOMContentLoaded', init);
      if (document.readyState !== 'loading') init();
    })();
  </script>
</body>
</html>
