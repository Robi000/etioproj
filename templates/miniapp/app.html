<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a0509">
  <meta name="bot-username" content="{{ bot_username }}">
  <title>Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #1a0509;
      --bg-2: #3d0f1e;
      --bg-3: #2a0a13;
      --glass: rgba(255,255,255,0.07);
      --glass-strong: rgba(255,255,255,0.13);
      --glass-hi: rgba(255,255,255,0.28);
      --glass-border: rgba(255,255,255,0.20);
      --red: #ff3b62;
      --red-2: #ff6f8f;
      --red-deep: #c81e45;
      --rose-gold: #ffb4a2;
      --gold: #ffd9a0;
      --success: #55e3a5;
      --warning: #ffd166;
      --danger: #ff6b7e;
      --ink: #fff6f3;
      --ink-dim: rgba(255,246,243,0.75);
      --ink-mute: rgba(255,246,243,0.52);
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --ease: 220ms cubic-bezier(.2,.9,.3,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; }
    body {
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(255,111,143,0.16), transparent 38%),
        linear-gradient(215deg, rgba(200,30,69,0.18), transparent 42%),
        #0c0306;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 12px;
      color: var(--ink);
      font-family: var(--font-body);
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }
    button { border: 0; }
    a { color: inherit; }
    img { display: block; max-width: 100%; }
    #app { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

    .phone {
      position: relative;
      width: 390px;
      max-width: 100%;
      height: 844px;
      max-height: 94vh;
      background:
        radial-gradient(120% 90% at 15% 0%, rgba(255,111,143,0.22), transparent 55%),
        radial-gradient(110% 90% at 90% 100%, rgba(200,30,69,0.30), transparent 55%),
        linear-gradient(175deg, var(--bg-2), var(--bg-1) 60%, var(--bg-3));
      border-radius: 46px;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow:
        0 30px 70px -25px rgba(0,0,0,0.7),
        0 0 0 10px #0a0203,
        0 0 0 11px rgba(255,255,255,0.05),
        inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      width: 120px;
      height: 26px;
      transform: translateX(-50%);
      border-radius: 0 0 18px 18px;
      background: #000;
      z-index: 50;
    }
    .statusbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 26px 4px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      z-index: 40;
    }
    .statusbar .icons { display: flex; align-items: center; gap: 5px; }
    .home-indicator {
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 134px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 3px;
      background: rgba(255,246,243,0.55);
      z-index: 50;
    }

    .miniapp {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .screens {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }
    .screen {
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 6px 20px 110px;
      scrollbar-width: none;
    }
    .screen::-webkit-scrollbar { display: none; }
    .screen.no-tabs { padding-bottom: 28px; }

    .glass {
      background: linear-gradient(150deg, var(--glass-strong), var(--glass) 70%);
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 18px 40px -20px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.25);
    }
    .shine {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      border-radius: inherit;
    }
    .shine::before {
      content: "";
      position: absolute;
      top: -60%;
      left: -30%;
      width: 60%;
      height: 220%;
      background: linear-gradient(100deg, transparent, rgba(255,255,255,0.28), transparent);
      transform: rotate(18deg);
      animation: sweep 5.5s ease-in-out infinite;
    }
    @keyframes sweep {
      0% { transform: translateX(-120%) rotate(18deg); }
      55% { transform: translateX(340%) rotate(18deg); }
      100% { transform: translateX(340%) rotate(18deg); }
    }

    .state-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
      padding: 48px 24px;
    }
    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.14);
      border-top-color: var(--red-2);
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text, .state-copy {
      color: var(--ink-dim);
      font-size: 14px;
      line-height: 1.55;
      max-width: 290px;
    }
    .state-icon {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--rose-gold);
    }
    .state-screen h1,
    .state-screen h3 {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 24px;
      font-weight: 600;
      color: #fff;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-mute);
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }
    .eyebrow .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red-2);
      box-shadow: 0 0 0 4px rgba(255,111,143,0.22), 0 0 10px rgba(255,59,98,0.7);
    }
    .home-header {
      padding-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .brandmark { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .brandmark .glyph {
      width: 26px;
      height: 26px;
      border-radius: 9px;
      background: linear-gradient(155deg, var(--red-2), var(--red-deep));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px -4px rgba(255,59,98,0.7);
      flex: 0 0 auto;
    }
    .brandmark .glyph svg { width: 14px; height: 14px; }
    .date-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px 7px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-dim);
      min-width: 0;
      max-width: 154px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .date-chip svg { width: 14px; height: 14px; color: var(--red-2); flex: 0 0 auto; }
    .greeting {
      margin: 20px 0 4px;
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 600;
      font-size: 36px;
      line-height: 1.06;
      letter-spacing: 0;
      background: linear-gradient(100deg, #fff, var(--rose-gold) 60%, var(--red-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      overflow-wrap: anywhere;
    }
    .meta-line {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--ink-mute);
      margin-bottom: 22px;
      font-weight: 500;
      flex-wrap: wrap;
    }
    .meta-line svg { width: 13px; height: 13px; color: var(--rose-gold); flex: 0 0 auto; }
    .meta-line .sep { opacity: 0.5; }

    .radar-tile {
      position: relative;
      border-radius: var(--radius-lg);
      padding: 24px 22px 22px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .35s cubic-bezier(.2,.9,.3,1);
      min-height: 178px;
    }
    .radar-tile:active { transform: scale(0.98); }
    .radar-tile-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 2;
    }
    .radar-tile h2 {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 6px;
      color: #fff;
    }
    .radar-tile p {
      font-size: 13px;
      color: var(--ink-dim);
      margin: 0;
      max-width: 184px;
      line-height: 1.45;
    }
    .tile-arrow {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(155deg, var(--red-2), var(--red));
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      box-shadow: 0 6px 18px -4px rgba(255,59,98,0.8);
    }
    .tile-arrow svg { width: 16px; height: 16px; }
    .pulse-wrap {
      position: absolute;
      right: -30px;
      bottom: -30px;
      width: 190px;
      height: 190px;
      z-index: 1;
    }
    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(255,111,143,0.5);
      animation: pulseOut 3s ease-out infinite;
      opacity: 0;
    }
    .pulse-ring.p2 { animation-delay: 1s; }
    .pulse-ring.p3 { animation-delay: 2s; }
    @keyframes pulseOut {
      0% { transform: scale(0.35); opacity: 0.75; }
      100% { transform: scale(1); opacity: 0; }
    }
    .pulse-core {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff, var(--red-2) 45%, var(--red-deep) 100%);
      box-shadow: 0 0 30px rgba(255,59,98,0.8), inset 0 2px 6px rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pulse-core svg { width: 22px; height: 22px; }

    .tile-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 14px;
    }
    .small-tile {
      position: relative;
      border-radius: var(--radius-md);
      padding: 17px;
      cursor: pointer;
      transition: transform .3s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 116px;
      overflow: hidden;
    }
    .small-tile:active { transform: scale(0.97); }
    .small-tile .icon-badge {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      position: relative;
      z-index: 2;
    }
    .small-tile .icon-badge svg { width: 16px; height: 16px; }
    .small-tile h3 {
      font-weight: 700;
      font-size: 14.5px;
      margin: 0 0 3px;
      color: #fff;
      position: relative;
      z-index: 2;
    }
    .small-tile span {
      font-size: 11.5px;
      color: var(--ink-mute);
      position: relative;
      z-index: 2;
      font-weight: 500;
    }
    .badge-saved { background: linear-gradient(155deg, var(--red-2), var(--red-deep)); box-shadow: 0 4px 14px -4px rgba(255,59,98,0.6); }
    .badge-service { background: linear-gradient(155deg, var(--gold), var(--rose-gold)); box-shadow: 0 4px 14px -4px rgba(255,180,162,0.6); }
    .badge-saved svg, .badge-service svg { color: #2a060f; }

    .section-title {
      font-size: 11.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--ink-mute);
      margin: 26px 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--glass-border), transparent);
    }
    .mini-list { display: flex; flex-direction: column; gap: 10px; }
    .mini-card {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: var(--radius-sm);
      padding: 11px 13px;
      cursor: pointer;
    }
    .mini-card .avatar,
    .saved-card .thumb {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: #2a060f;
      overflow: hidden;
    }
    .mini-card .avatar img,
    .saved-card .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .mini-card .body,
    .saved-card .body { flex: 1; min-width: 0; }
    .mini-card .body h4,
    .saved-card .body h4 {
      margin: 0;
      font-size: 13.5px;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-card .body p,
    .saved-card .body p {
      margin: 2px 0 0;
      font-size: 11px;
      color: var(--ink-mute);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-card .price {
      font-size: 12px;
      color: var(--rose-gold);
      font-weight: 700;
      white-space: nowrap;
    }

    .subtop {
      padding-top: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex: 0 0 auto;
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex: 0 0 auto;
      color: #fff;
      background: rgba(255,255,255,0.06);
    }
    .icon-btn:active { transform: scale(0.94); }
    .subtop h1 {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 600;
      font-size: 22px;
      margin: 0;
      flex: 1;
      color: #fff;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .subtop .count-pill {
      font-size: 11px;
      color: var(--ink-dim);
      padding: 6px 12px;
      border-radius: 100px;
      font-weight: 600;
      white-space: nowrap;
    }

    .usage-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 32px;
      border-radius: 999px;
      padding: 7px 12px;
      margin-bottom: 8px;
      color: var(--ink-dim);
      font-size: 11px;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .usage-left { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .usage-stat { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    .usage-stat.warn { color: var(--warning); }
    .usage-stat.danger { color: var(--danger); }
    .usage-dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 auto; }
    .usage-dot.green { background: var(--success); }
    .usage-dot.amber { background: var(--warning); }
    .usage-dot.red { background: var(--danger); }

    .stack-area {
      position: relative;
      flex: 1;
      min-height: 410px;
      margin-top: 6px;
    }
    .swipe-card {
      position: absolute;
      inset: 0;
      border-radius: 26px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      touch-action: none;
      user-select: none;
      transition: transform .35s cubic-bezier(.2,.9,.3,1), opacity .35s ease;
      will-change: transform;
    }
    .swipe-card.verified-effect,
    .detail-hero.verified-effect,
    .service-hero.verified-effect {
      border-color: rgba(255,111,143,0.54);
      box-shadow:
        0 18px 44px -18px rgba(255,59,98,0.72),
        inset 0 1px 0 rgba(255,255,255,0.35);
    }
    .swipe-card.tested-effect,
    .detail-hero.tested-effect,
    .service-hero.tested-effect {
      border-color: rgba(255,217,160,0.62);
      box-shadow:
        0 18px 44px -18px rgba(255,217,160,0.58),
        inset 0 1px 0 rgba(255,255,255,0.35);
    }
    .swipe-card.verified-effect::before,
    .swipe-card.tested-effect::before,
    .detail-hero.verified-effect::before,
    .detail-hero.tested-effect::before,
    .service-hero.verified-effect::before,
    .service-hero.tested-effect::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 4;
      border-radius: inherit;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.28);
      animation: haloPulse 2.6s ease-in-out infinite;
    }
    @keyframes haloPulse {
      0%, 100% { opacity: 0.42; }
      50% { opacity: 0.95; }
    }
    .swipe-card .hero {
      height: 48%;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 16px;
      overflow: hidden;
      background: linear-gradient(155deg, #ff8fa3, #c81e45);
    }
    .swipe-card .hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .swipe-card .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(10,3,5,0.62), transparent 60%);
      z-index: 1;
      pointer-events: none;
    }
    .media-carousel {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: inherit;
    }
    .media-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
    }
    .media-slide.active {
      opacity: 1;
      pointer-events: auto;
    }
    .media-nav {
      position: absolute;
      top: 44%;
      z-index: 8;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: rgba(10,3,5,0.42);
      border: 1px solid rgba(255,255,255,0.28);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transform: translateY(-50%);
      pointer-events: auto;
      touch-action: manipulation;
    }
    .media-nav.prev { left: 12px; }
    .media-nav.next { right: 12px; }
    .media-nav.next svg { transform: rotate(180deg); }
    .media-nav svg { width: 16px; height: 16px; }
    .media-dots {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 12px;
      z-index: 8;
      display: flex;
      justify-content: center;
      gap: 6px;
      pointer-events: none;
    }
    .media-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,246,243,0.38);
      transition: transform .18s ease, background .18s ease;
    }
    .media-dots span.active {
      background: var(--rose-gold);
      transform: scale(1.35);
    }
    .cat-badge {
      position: relative;
      z-index: 2;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      color: #2a060f;
      background: rgba(255,255,255,0.62);
      box-shadow: 0 8px 20px -8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
      overflow: hidden;
    }
    .swipe-card .stamp {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 2;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 10px;
      border-radius: 100px;
      background: rgba(10,3,5,0.4);
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(8px);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .swipe-card .stamp svg { width: 10px; height: 10px; color: var(--red-2); }
    .swipe-card .info {
      flex: 1;
      padding: 14px 18px 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .swipe-summary {

      transform: translateY(110%);
      transition: transform .25s ease;
      color: var(--ink);
    }
    .usage-modal-backdrop.show .usage-modal,
    .sheet-backdrop.show .sheet { transform: translateY(0); }
    .usage-modal h3,
    .sheet h3 {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .usage-modal-sub,
    .sheet-copy {
      color: var(--ink-dim);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .usage-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--glass-border);
      font-size: 13px;
    }
    .usage-detail-row:last-child { border-bottom: 0; }
    .usage-detail-label { color: var(--ink-mute); }
    .usage-detail-value { font-weight: 800; color: #fff; }
    .usage-countdown-large {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      padding: 12px 0 4px;
      font-variant-numeric: tabular-nums;
    }
    .usage-countdown-label {
      text-align: center;
      font-size: 12px;
      color: var(--ink-mute);
      margin-bottom: 12px;
    }
    .budget-field-label {
      display: block;
      color: var(--ink-mute);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
    }
    .budget-input {
      width: 100%;
      min-height: 48px;
      border-radius: 15px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.08);
      color: #fff;
      padding: 0 14px;
      font-size: 16px;
      font-weight: 800;
      outline: none;
    }
    .budget-average,
    .budget-error {
      margin-top: 10px;
      color: var(--ink-mute);
      font-size: 12px;
      line-height: 1.45;
    }
    .budget-error { color: var(--danger); min-height: 17px; }
    .sheet-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .no-photo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: rgba(255,246,243,0.42);
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .img-load-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(255,111,143,0.08), rgba(200,30,69,0.05));
    }
    .img-load-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 360ms cubic-bezier(.2,.9,.3,1);
    }
    .img-load-wrap img.loaded {
      opacity: 1;
    }
    .img-shimmer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .img-shimmer::before {
      content: "";
      position: absolute;
      top: 0;
      left: -60%;
      width: 60%;
      height: 100%;
      background: linear-gradient(100deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: skewX(-20deg);
      animation: shimmer 2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%) skewX(-20deg); }
      60% { transform: translateX(400%) skewX(-20deg); }
      100% { transform: translateX(400%) skewX(-20deg); }
    }
    .img-shimmer.fade-out {
      opacity: 0;
      transition: opacity 300ms ease;
    }

    @media (max-width: 520px) {
      body { padding: 0; align-items: stretch; justify-content: stretch; }
      #app { align-items: stretch; justify-content: stretch; }
      .phone {
        width: 100vw;
        height: 100dvh;
        max-height: none;
        border-radius: 0;
        border: 0;
        box-shadow: none;
      }
      .notch,
      .statusbar,
      .home-indicator { display: none; }
      .screen { padding: 16px 18px calc(106px + var(--safe-bottom)); }
      .screen.no-tabs { padding-bottom: calc(24px + var(--safe-bottom)); }
      .tabbar { bottom: calc(12px + var(--safe-bottom)); }
      .toast { bottom: calc(118px + var(--safe-bottom)); }
    }
    @media (max-width: 360px) {
      .greeting { font-size: 31px; }
      .stack-area { min-height: 380px; }
      .swipe-card .stats { gap: 10px; }
      .swipe-summary {
        grid-template-columns: minmax(92px, 0.86fr) minmax(0, 1.14fr);
        gap: 9px;
      }
      .swipe-card .info h2 {
        font-size: 24px;
      }
      .detail-price-layout {
        grid-template-columns: 1fr;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .pulse-ring,
      .shine::before { animation: none; }
      * { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast"></div>
  <div id="usageModalBackdrop" class="usage-modal-backdrop">
    <div class="usage-modal glass">
      <h3 id="usageModalTitle">Contact Limit Reached</h3>
      <div id="usageModalSub" class="usage-modal-sub"></div>
      <div id="usageModalDetails"></div>
      <button class="btn-primary" id="usageModalCloseBtn" type="button">Got it</button>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        if (typeof tg.enableClosingConfirmation === 'function') tg.enableClosingConfirmation();
      }

      const SWIPE_BATCH_SIZE = 4;
      const imageFailureCache = new Set();
      const imagePreloadCache = new Set();
      let toastTimer = null;

      const state = {
        screen: 'loading',
        user: null,
        token: null,
        categories: [],
        filters: { category_id: null },
        services: [],
        currentIndex: 0,
        savedServices: [],
        myService: null,
        usageInfo: null,
        contactResult: null,
        _swipeSeenIds: [],
        _swipeNextCards: [],
        _prevScreen: 'home',
        _detailService: null,
      };

      const icons = {
        heart: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 20s-7-4.3-9.5-8.8C.8 7.6 2.6 4 6.2 4c2 0 3.4 1 5 3 1.6-2 3-3 5-3 3.6 0 5.4 3.6 3.7 7.2C19 15.7 12 20 12 20Z" fill="currentColor"/></svg>',
        heartStroke: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 20s-7-4.3-9.5-8.8C.8 7.6 2.6 4 6.2 4c2 0 3.4 1 5 3 1.6-2 3-3 5-3 3.6 0 5.4 3.6 3.7 7.2C19 15.7 12 20 12 20Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>',
        back: '<svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        arrow: '<svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        calendar: '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="3" stroke="currentColor" stroke-width="1.6"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>',
        location: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 21s7-5.1 7-11a7 7 0 1 0-14 0c0 5.9 7 11 7 11Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="10" r="2.4" stroke="currentColor" stroke-width="1.6"/></svg>',
        home: '<svg viewBox="0 0 24 24" fill="none"><path d="M4 11.5 12 5l8 6.5V19a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1v-7.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>',
        discover: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 20s-6-3.7-8.2-7.6C2.3 9.4 3.7 6.5 6.6 6.5c1.7 0 3 .9 5.4 3.4 2.4-2.5 3.7-3.4 5.4-3.4 2.9 0 4.3 2.9 2.8 5.9C18 16.3 12 20 12 20Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>',
        saved: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>',
        service: '<svg viewBox="0 0 24 24" fill="none"><path d="M3 9.5 12 4l9 5.5V19a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V9.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>',
        x: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/></svg>',
        check: '<svg viewBox="0 0 24 24" fill="none"><path d="m5 12 4.2 4.2L19 6.8" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        bookmark: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></svg>',
        phone: '<svg viewBox="0 0 24 24" fill="none"><path d="M8.5 4.5 6 6.8c-.6.5-.8 1.4-.5 2.1 1.7 4.6 5 7.9 9.6 9.6.7.3 1.6.1 2.1-.5l2.3-2.5-3.8-3.1-1.8 1.7c-1.7-.9-3.1-2.3-4-4l1.7-1.8-3.1-3.8Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>',
        trash: '<svg viewBox="0 0 24 24" fill="none"><path d="M5 7h14M10 11v6M14 11v6M8 7l1-3h6l1 3M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      };
      const LIKE_STATUS_EMOJIS = ['🙂', '😊', '😍', '🔥', '💎'];

      function renderApp(html) {
        document.getElementById('app').innerHTML = html;
      }

      function getBotUsername() {
        const meta = document.querySelector('meta[name="bot-username"]');
        return meta ? meta.getAttribute('content') : '';
      }

      function getBotDeepLink(startParam) {
        const botUsername = getBotUsername().replace(/^@/, '');
        if (!botUsername) return null;
        return 'https://t.me/' + botUsername + (startParam ? '?start=' + encodeURIComponent(startParam) : '');
      }

      function getApiBase() {
        return window.location.origin + '/api';
      }

      function fetchApi(path, opts = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (state.token) headers.Authorization = 'Token ' + state.token;
        return fetch(getApiBase() + path, { ...opts, headers })
          .then(r => r.json())
          .catch(err => ({ success: false, error: err.message || 'Network error' }));
      }

      function qs(key) {
        return new URLSearchParams(window.location.search).get(key);
      }

      function escHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function escAttr(str) {
        return escHtml(str);
      }

      function showToast(msg, type) {
        const el = document.getElementById('toast');
        if (!el) return;
        el.textContent = msg;
        el.className = 'toast show' + (type ? ' ' + type : '');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
      }

      function todayLabel() {
        return new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
      }

      function userCanManageService() {
        const role = state.user && state.user.role;
        return role === 'provider' || role === 'both';
      }

      function userIsPureProvider() {
        return state.user && state.user.role === 'provider';
      }

      function displayName() {
        return state.user ? (state.user.display_name || state.user.first_name || 'User') : 'User';
      }

      function cityLabel() {
        return state.user && state.user.city ? state.user.city : 'Nearby';
      }

      function serviceStatusLabel(status) {
        const normalized = String(status || '').toLowerCase();
        if (normalized === 'approved') return 'Approved';
        if (normalized === 'rejected') return 'Rejected';
        if (normalized === 'pending') return 'Pending';
        return status || 'Unknown';
      }

      function renderPhone(content, activeScreen, opts = {}) {
        const showTabs = opts.showTabs !== false;
        const noTabs = showTabs ? '' : ' no-tabs';
        renderApp(`
          <div class="phone">
            <div class="notch"></div>
            <div class="statusbar">
              <span>${new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}</span>
              <div class="icons">
                <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><rect x="0" y="7" width="2.5" height="4" rx="0.5" fill="currentColor"/><rect x="4.5" y="5" width="2.5" height="6" rx="0.5" fill="currentColor"/><rect x="9" y="2.5" width="2.5" height="8.5" rx="0.5" fill="currentColor"/><rect x="13.5" y="0" width="2.5" height="11" rx="0.5" fill="currentColor"/></svg>
                <svg width="18" height="11" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="20" height="10" rx="2.5" stroke="currentColor" stroke-width="1.2"/><rect x="2.5" y="2.5" width="15" height="7" rx="1.2" fill="currentColor"/><rect x="22" y="4" width="1.6" height="4" rx="0.8" fill="currentColor"/></svg>
              </div>
            </div>
            <div class="miniapp" data-role="${escAttr((state.user && state.user.role) || 'guest')}">
              <main class="screens">
                <section class="screen${noTabs}" id="screen-${escAttr(activeScreen)}">${content}</section>
              </main>
              ${showTabs ? renderTabbar(activeScreen) : ''}
            </div>
            <div class="home-indicator"></div>
          </div>
        `);
        bindNav();
      }

      function renderTabbar(activeScreen) {
        const serviceTab = userCanManageService()
          ? `<button class="tab${activeScreen === 'my_service' ? ' is-active' : ''}" data-nav="my_service" type="button"><span class="icon-wrap">${icons.service}</span>My Service</button>`
          : '';
        return `
          <nav class="tabbar glass">
            <button class="tab${activeScreen === 'home' ? ' is-active' : ''}" data-nav="home" type="button"><span class="icon-wrap">${icons.home}</span>Home</button>
            <button class="tab${activeScreen === 'swipe' ? ' is-active' : ''}" data-nav="swipe" type="button"><span class="icon-wrap">${icons.discover}</span>Discover</button>
            <button class="tab${activeScreen === 'saved' ? ' is-active' : ''}" data-nav="saved" type="button"><span class="icon-wrap">${icons.saved}</span>Saved</button>
            ${serviceTab}
          </nav>
        `;
      }

      function bindNav() {
        document.querySelectorAll('[data-nav]').forEach(el => {
          el.addEventListener('click', () => navigate(el.getAttribute('data-nav')));
        });
        document.querySelectorAll('[data-keynav]').forEach(el => {
          el.addEventListener('keydown', event => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              el.click();
            }
          });
        });
      }

      function renderLoading() {
        renderPhone(`
          <div class="state-screen screen">
            <div class="spinner"></div>
            <div class="loading-text">Loading Marketplace...</div>
          </div>
        `, 'loading', { showTabs: false });
      }

      function renderError(msg) {
        renderPhone(`
          <div class="state-screen screen">
            <div class="state-icon glass">${icons.heartStroke}</div>
            <h3>Something went wrong</h3>
            <p class="state-copy">${escHtml(msg || 'An unexpected error occurred.')}</p>
            <button class="btn-primary" type="button" id="reloadBtn">Try Again</button>
          </div>
        `, 'error', { showTabs: false });
        const btn = document.getElementById('reloadBtn');
        if (btn) btn.addEventListener('click', () => window.location.reload());
      }

      function renderPolicyGate() {
        const deepLink = getBotDeepLink('policy');
        renderPhone(`
          <div class="state-screen screen">
            <div class="state-icon glass">${icons.service}</div>
            <h1>Policy Required</h1>
            <p class="state-copy">To use this marketplace, open the bot and complete the policy review.</p>
            ${deepLink ? `<a class="btn-primary" href="${escAttr(deepLink)}" target="_blank" rel="noopener">Open Bot</a>` : '<button class="btn-outline" disabled type="button">Bot username missing</button>'}
          </div>
        `, 'policy_gate', { showTabs: false });
      }

      function renderHome() {
        state.screen = 'home';
        const manageTile = userCanManageService() ? `
          <div class="tile-row">
            <div class="small-tile glass" data-nav="my_service" data-keynav tabindex="0" role="button">
              <span class="icon-badge badge-service">${icons.service}</span>
              <div>
                <h3>My Service</h3>
                <span id="myServiceMiniLabel">Manage listing status</span>
              </div>
            </div>
          </div>` : '';
        renderPhone(`
          <div class="home-header">
            <div class="brandmark">
              <span class="glyph">${icons.heart}</span>
              <span class="eyebrow"><span class="dot"></span>Marketplace</span>
            </div>
            <div class="date-chip glass" title="${escAttr(cityLabel())}">${icons.location}<span>${escHtml(cityLabel())}</span></div>
          </div>

          <h1 class="greeting">Hello, ${escHtml(displayName())}</h1>
          <div class="meta-line">
            ${icons.calendar}<span>${escHtml(todayLabel())}</span>
            <span class="sep">.</span>
            ${icons.location}<span>${escHtml(cityLabel())}</span>
          </div>

          <div class="radar-tile glass" data-nav="swipe" data-keynav tabindex="0" role="button">
            <div class="shine"></div>
            <div class="radar-tile-top">
              <div>
                <h2>Find a Service</h2>
                <p>${userIsPureProvider() ? 'Browse nearby listings and save useful providers. Contact requests are for customer accounts.' : "Someone nearby is exactly what you're looking for. Start swiping."}</p>
              </div>
              <span class="tile-arrow">${icons.arrow}</span>
            </div>
            <div class="pulse-wrap" aria-hidden="true">
              <div class="pulse-ring"></div>
              <div class="pulse-ring p2"></div>
              <div class="pulse-ring p3"></div>
              <div class="pulse-core">${icons.heart}</div>
            </div>
          </div>

          ${manageTile}

          <div class="tile-row">
            <div class="small-tile glass" data-nav="saved" data-keynav tabindex="0" role="button">
              <span class="icon-badge badge-saved">${icons.saved}</span>
              <div>
                <h3>Saved Services</h3>
                <span id="savedCountLabel">${state.savedServices.length} saved</span>
              </div>
            </div>
          </div>

          <div class="section-title">Trending nearby</div>
          <div class="mini-list" id="trendingList">
            <div class="mini-card glass"><div class="avatar">...</div><div class="body"><h4>Loading nearby</h4><p>Checking approved services</p></div><div class="price">Live</div></div>
          </div>
        `, 'home');
        loadHomePreview();
        loadSavedServices(true);
        if (userCanManageService()) loadMyServiceSummary();
      }

      function renderSubtop(title, pill, backTarget) {
        return `
          <div class="subtop">
            <button class="icon-btn glass" data-nav="${escAttr(backTarget || 'home')}" type="button" aria-label="Back">${icons.back}</button>
            <h1>${escHtml(title)}</h1>
            ${pill ? `<span class="count-pill glass">${escHtml(pill)}</span>` : ''}
          </div>
        `;
      }

      function categoryInitials(svc) {
        const name = svc && svc.category && svc.category.name ? svc.category.name : (svc && svc.title ? svc.title : 'MP');
        return name.split(/\s+/).filter(Boolean).slice(0, 2).map(part => part[0]).join('').toUpperCase() || 'MP';
      }

      function categoryGradient(svc) {
        const key = String((svc && svc.category && svc.category.name) || '').toLowerCase();
        let hash = 0;
        for (let i = 0; i < key.length; i++) hash = ((hash << 5) - hash) + key.charCodeAt(i);
        const gradients = [
          ['#ff8fa3', '#c81e45'],
          ['#ffd9a0', '#e0955a'],
          ['#ffb4a2', '#c8536b'],
          ['#ff6f8f', '#a4123a'],
          ['#ffc2d1', '#c8447a'],
          ['#ffe1b3', '#d98a4a'],
        ];
        const pair = gradients[Math.abs(hash) % gradients.length];
        return 'linear-gradient(155deg,' + pair[0] + ',' + pair[1] + ')';
      }

      function getPhotoSrc(photo) {
        if (!photo) return null;
        if (photo.url) return photo.url;
        if (photo.photo_url) return photo.photo_url;
        if (photo.telegram_file_id && /^https?:\/\//i.test(photo.telegram_file_id)) return photo.telegram_file_id;
        if (photo.id) return getApiBase() + '/service/photo/' + encodeURIComponent(photo.id) + '/';
        return null;
      }

      function sortedPhotos(svc) {
        const photos = [...((svc && svc.photos) || [])].sort((a, b) => a.order_index - b.order_index);
        return photos;
      }

      function firstPhoto(svc) {
        const photos = sortedPhotos(svc);
        return photos[0] || null;
      }

      function renderPhotoOrInitial(svc, className) {
        const src = getPhotoSrc(firstPhoto(svc));
        if (src && !imageFailureCache.has(src)) {
          const shimmerId = 'shim-' + Math.random().toString(36).slice(2, 9);
          return `<span class="${className || 'avatar'}" style="position:relative;overflow:hidden"><div class="img-shimmer" id="${shimmerId}" style="position:absolute;inset:0"></div><img src="${escAttr(src)}" alt="" loading="lazy" decoding="async" onerror="window.app&&window.app.markImageFailed(this)" onload="window.app&&window.app.onPhotoLoaded('${shimmerId}',this)" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 360ms cubic-bezier(.2,.9,.3,1)"></span>`;
        }
        return `<span class="${className || 'avatar'}" style="background:${categoryGradient(svc)}">${escHtml(categoryInitials(svc))}</span>`;
      }

      function renderOptimizedImageOrPlaceholder(photo, eager) {
        const src = getPhotoSrc(photo);
        if (src && imageFailureCache.has(src)) return '<div class="no-photo">No photo</div>';
        if (!src) return '<div class="no-photo">No photo</div>';
        const shimmerId = 'shim-' + Math.random().toString(36).slice(2, 9);
        return '<div class="img-load-wrap">'
          + '<div class="img-shimmer" id="' + shimmerId + '"></div>'
          + '<img src="' + escAttr(src) + '" alt="" loading="' + (eager ? 'eager' : 'lazy') + '" decoding="async" onerror="window.app&&window.app.markImageFailed(this)" onload="window.app&&window.app.onPhotoLoaded(\'' + shimmerId + '\',this)">'
          + '</div>';
      }

      function renderHeroMedia(svc, carouselId, eager) {
        const photos = sortedPhotos(svc);
        if (!photos.length) return '';
        const slides = photos.map((photo, index) => (
          '<div class="media-slide' + (index === 0 ? ' active' : '') + '" data-slide-index="' + index + '">'
          + renderOptimizedImageOrPlaceholder(photo, eager && index === 0)
          + '</div>'
        )).join('');
        const controls = photos.length > 1
          ? '<button class="media-nav prev" type="button" data-carousel-dir="-1" aria-label="Previous photo">' + icons.back + '</button>'
            + '<button class="media-nav next" type="button" data-carousel-dir="1" aria-label="Next photo">' + icons.back + '</button>'
            + '<div class="media-dots">' + photos.map((_, index) => '<span class="' + (index === 0 ? 'active' : '') + '"></span>').join('') + '</div>'
          : '';
        return '<div class="media-carousel" data-carousel="' + escAttr(carouselId) + '" data-carousel-index="0">' + slides + controls + '</div>';
      }

      function markImageFailed(img) {
        if (!img) return;
        const src = img.currentSrc || img.getAttribute('src') || '';
        if (src) imageFailureCache.add(src);
        const parent = img.parentElement;
        img.remove();
        if (parent) {
          const shimmer = parent.querySelector('.img-shimmer');
          if (shimmer) shimmer.remove();
          if (!parent.querySelector('.no-photo')) {
            const fallback = document.createElement('div');
            fallback.className = 'no-photo';
            fallback.textContent = 'No photo';
            parent.appendChild(fallback);
          }
        }
      }

      function onPhotoLoaded(shimmerId, img) {
        const shimmer = document.getElementById(shimmerId);
        if (shimmer) {
          shimmer.classList.add('fade-out');
          setTimeout(function() { if (shimmer) shimmer.remove(); }, 300);
        }
        if (img) {
          img.style.opacity = '1';
        }
      }

      function preloadFirstPhoto(svc) {
        const src = getPhotoSrc(firstPhoto(svc));
        if (!src || imageFailureCache.has(src) || imagePreloadCache.has(src)) return;
        imagePreloadCache.add(src);
        const img = new Image();
        img.decoding = 'async';
        img.onerror = () => imageFailureCache.add(src);
        img.src = src;
      }

      function bindCarousels(root) {
        const scope = root || document;
        scope.querySelectorAll('.media-carousel').forEach(carousel => {
          if (carousel.dataset.bound === '1') return;
          carousel.dataset.bound = '1';
          carousel.querySelectorAll('.media-nav').forEach(button => {
            button.addEventListener('pointerdown', event => event.stopPropagation());
            button.addEventListener('click', event => {
              event.preventDefault();
              event.stopPropagation();
              changeCarousel(carousel, Number(button.dataset.carouselDir || 1));
            });
          });
        });
      }

      function changeCarousel(carousel, dir) {
        if (!carousel) return;
        const slides = Array.from(carousel.querySelectorAll('.media-slide'));
        if (slides.length < 2) return;
        let index = Number(carousel.dataset.carouselIndex || 0);
        index = (index + dir + slides.length) % slides.length;
        carousel.dataset.carouselIndex = String(index);
        slides.forEach((slide, slideIndex) => slide.classList.toggle('active', slideIndex === index));
        carousel.querySelectorAll('.media-dots span').forEach((dot, dotIndex) => dot.classList.toggle('active', dotIndex === index));
      }

      function serviceEffectClass(svc) {
        const classes = [];
        if (serviceIsVerified(svc)) classes.push('verified-effect');
        if (serviceIsTested(svc)) classes.push('tested-effect');
        return classes.join(' ');
      }

      function serviceStatusText(svc) {
        if (serviceIsVerified(svc) && serviceIsTested(svc)) return 'Verified + Tested';
        if (serviceIsVerified(svc)) return 'Verified';
        if (serviceIsTested(svc)) return 'Tested';
        return 'Approved';
      }

      function likeStatusLevel(likesCount) {
        const count = Number(likesCount || 0);
        if (count >= 150) return 5;
        if (count >= 70) return 4;
        if (count >= 30) return 3;
        if (count >= 10) return 2;
        if (count >= 1) return 1;
        return 0;
      }

      function likeStatusMessage(svc) {
        const count = Number((svc && svc.likes_count) || 0);
        const labels = ['No likes yet', 'Getting noticed', 'Liked by locals', 'Popular nearby', 'Hot right now', 'Top liked'];
        return count + ' likes / ' + labels[likeStatusLevel(count)];
      }

      function renderLikeStatus(svc) {
        const level = likeStatusLevel(svc && svc.likes_count);
        return '<div class="like-status" data-like-status-message="' + escAttr(likeStatusMessage(svc)) + '">'
          + LIKE_STATUS_EMOJIS.map((emoji, index) => {
            const active = index < level;
            const current = index === Math.max(0, level - 1);
            return '<button type="button" class="emoji-slot' + (active ? ' active' : '') + (current ? ' current' : '') + '" aria-label="Like status ' + (index + 1) + '">' + emoji + '</button>';
          }).join('')
          + '</div>';
      }

      function bindLikeStatus(root) {
        const scope = root || document;
        scope.querySelectorAll('.like-status').forEach(status => {
          if (status.dataset.bound === '1') return;
          status.dataset.bound = '1';
          status.querySelectorAll('.emoji-slot').forEach(button => {
            button.addEventListener('pointerdown', event => event.stopPropagation());
            button.addEventListener('click', event => {
              event.preventDefault();
              event.stopPropagation();
              button.classList.add('pulse');
              setTimeout(() => button.classList.remove('pulse'), 220);
              showToast(status.dataset.likeStatusMessage || 'Like status');
            });
          });
        });
      }

      function priceSummary(svc) {
        const prices = (svc && svc.prices) || [];
        if (!prices.length) return 'Ask';
        const preferred = prices.find(p => p.price_type === 'half_day') || prices.find(p => p.price_type === 'full_day') || prices[0];
        return priceAmountText(preferred);
      }

      function formatPrice(price) {
        const labels = { half_day: 'Half Day', full_day: 'Full Day', night: 'Night' };
        return (labels[price.price_type] || price.price_type) + ': ' + price.amount + ' ETB';
      }

      function priceAmountText(price) {
        if (!price || price.amount === null || price.amount === undefined || price.amount === '') return 'Ask';
        return price.amount + ' ETB';
      }

      function priceRows(svc) {
        const byType = {};
        ((svc && svc.prices) || []).forEach(price => {
          if (price && price.price_type) byType[price.price_type] = price;
        });
        return [
          { type: 'half_day', label: 'Half day', tone: 'little', tag: 'Lite', value: priceAmountText(byType.half_day) },
          { type: 'full_day', label: 'Full day', tone: '', tag: 'Standard', value: priceAmountText(byType.full_day) },
          { type: 'night', label: 'Night', tone: 'premium', tag: 'Premium', value: priceAmountText(byType.night) },
        ];
      }

      function renderPriceStack(svc, compact) {
        return '<div class="price-stack' + (compact ? ' compact' : '') + '">'
          + priceRows(svc).map(row => (
            '<div class="price-pill ' + row.tone + '">'
            + '<span class="price-label"><span>' + escHtml(row.label) + '</span><span class="price-premium-mark">' + escHtml(row.tag) + '</span></span>'
            + '<span class="price-value">' + escHtml(row.value) + '</span>'
            + '</div>'
          )).join('')
          + '</div>';
      }

      function serviceDistanceText(svc) {
        if (svc && svc.distance_km !== null && svc.distance_km !== undefined) {
          const n = Number(svc.distance_km);
          if (Number.isFinite(n)) return n.toFixed(n < 10 ? 1 : 0) + ' km';
        }
        return (svc && svc.city_text) || cityLabel();
      }

      function serviceMeta(svc) {
        const category = svc && svc.category ? svc.category.name : 'Service';
        return category + ' / ' + serviceDistanceText(svc);
      }

      function renderMiniCard(svc) {
        return `
          <div class="mini-card glass" data-service-id="${escAttr(svc.id)}">
            ${renderPhotoOrInitial(svc, 'avatar')}
            <div class="body">
              <h4>${escHtml(svc.title || 'Service')}</h4>
              <p>${escHtml(serviceMeta(svc))} / ${escHtml((svc.likes_count || 0) + ' likes')}</p>
              ${renderLikeStatus(svc)}
            </div>
            <div class="price">${escHtml(priceSummary(svc))}</div>
          </div>
        `;
      }

      function buildDiscoveryQuery(extra) {
        const params = new URLSearchParams();
        if (state.filters.category_id) params.set('category_id', state.filters.category_id);
        Object.entries(extra || {}).forEach(([key, value]) => {
          if (value !== null && value !== undefined && value !== '') params.set(key, value);
        });
        const query = params.toString();
        return query ? '?' + query : '';
      }

      function rememberSwipeCard(svc) {
        if (!svc || !svc.id) return;
        if (!state._swipeSeenIds.includes(svc.id)) state._swipeSeenIds.push(svc.id);
      }

      function buildSwipeDiscoveryQuery(extra) {
        const params = { ...(extra || {}) };
        const excludeIds = new Set(state._swipeSeenIds || []);
        if (params.exclude_service_id) {
          excludeIds.add(Number(params.exclude_service_id));
          delete params.exclude_service_id;
        }
        if (params.exclude_service_ids) {
          String(params.exclude_service_ids).split(',').forEach(id => {
            const parsed = Number(id);
            if (parsed > 0) excludeIds.add(parsed);
          });
        }
        if (excludeIds.size) params.exclude_service_ids = Array.from(excludeIds).join(',');
        return buildDiscoveryQuery(params);
      }

      function loadHomePreview() {
        const list = document.getElementById('trendingList');
        if (!list) return;
        fetchApi('/discovery/swipe/' + buildDiscoveryQuery({ batch_size: 3 }))
          .then(res => {
            if (!document.getElementById('trendingList')) return;
            if (res.success && res.cards && res.cards.length) {
              list.innerHTML = res.cards.slice(0, 3).map(renderMiniCard).join('');
              bindLikeStatus(list);
              list.querySelectorAll('[data-service-id]').forEach(row => {
                row.addEventListener('click', () => {
                  const svc = res.cards.find(item => String(item.id) === String(row.dataset.serviceId));
                  if (svc) showCardDetail(svc, 'home');
                });
              });
            } else if (res.error === 'LOCATION_REQUIRED') {
              list.innerHTML = `
                <div class="empty-state glass" style="border-radius:var(--radius-md);min-height:190px">
                  <div class="ring">${icons.location}</div>
                  <h3>Location needed</h3>
                  <p>Share your GPS location to find nearby providers.</p>
                  <button class="btn-primary" type="button" id="homeLocationBtn">Share Location</button>
                </div>`;
              const btn = document.getElementById('homeLocationBtn');
              if (btn) btn.addEventListener('click', requestLocationFromMiniApp);
            } else {
              list.innerHTML = '<div class="mini-card glass"><div class="avatar">MP</div><div class="body"><h4>No nearby services yet</h4><p>Check again soon</p></div><div class="price">Soon</div></div>';
            }
          })
          .catch(() => {
            if (list) list.innerHTML = '<div class="mini-card glass"><div class="avatar">!</div><div class="body"><h4>Could not load nearby</h4><p>Try again later</p></div><div class="price">Error</div></div>';
          });
      }

      function loadMyServiceSummary() {
        const label = document.getElementById('myServiceMiniLabel');
        if (!label) return;
        fetchApi('/service/me/')
          .then(res => {
            if (!document.getElementById('myServiceMiniLabel')) return;
            if (res.success && res.service) {
              label.textContent = serviceStatusLabel(res.service.approval_status) + ' / ' + (res.service.visibility_status === 'on' ? 'visible' : 'hidden');
            } else {
              label.textContent = 'Create or finish your listing';
            }
          })
          .catch(() => {});
      }

      function renderSwipe() {
        state.screen = 'swipe';
        renderPhone(`
          ${renderSubtop('Discover', 'Nearby', 'home')}
          <div id="usageBar" class="usage-bar glass"></div>
          <div class="stack-area" id="stackArea">
            <div class="empty-state"><div class="spinner"></div><p>Loading approved services nearby...</p></div>
          </div>
          <div class="swipe-actions" id="swipeActions"></div>
        `, 'swipe');
        renderUsageBar(state.usageInfo);
        if (!state.services.length || state.currentIndex >= state.services.length) {
          loadSwipeServices(false);
        } else {
          renderSwipeContent();
        }
      }

      function loadSwipeServices(showLoading) {
        const container = document.getElementById('stackArea');
        const actions = document.getElementById('swipeActions');
        if (showLoading && container) {
          container.innerHTML = '<div class="empty-state"><div class="spinner"></div><p>Refreshing nearby services...</p></div>';
        }
        if (actions) actions.innerHTML = '';
        return fetchApi('/discovery/swipe/' + buildSwipeDiscoveryQuery({ batch_size: SWIPE_BATCH_SIZE }))
          .then(res => {
            state.usageInfo = res.provider_protection || state.usageInfo || null;
            renderUsageBar(state.usageInfo);
            const cards = res.success ? ((res.cards && res.cards.length) ? res.cards : (res.card ? [res.card] : [])) : [];
            if (cards.length) {
              state.services = cards;
              state.currentIndex = 0;
              state._swipeNextCards = [];
              state.contactResult = null;
              cards.forEach(rememberSwipeCard);
              preloadFirstPhoto(cards[1]);
              renderSwipeContent();
            } else if (res.error === 'LOCATION_REQUIRED') {
              renderLocationRequired();
            } else {
              state.services = [];
              state.currentIndex = 0;
              renderSwipeContent();
            }
          })
          .catch(() => {
            state.services = [];
            state.currentIndex = 0;
            renderSwipeContent();
          });
      }

      function renderLocationRequired() {
        const container = document.getElementById('stackArea');
        const actions = document.getElementById('swipeActions');
        if (container) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="ring glass">${icons.location}</div>
              <h3>Location needed</h3>
              <p>Share your GPS location to find nearby providers.</p>
              <button class="btn-primary" type="button" id="shareLocationBtn">Share Location</button>
            </div>`;
          document.getElementById('shareLocationBtn').addEventListener('click', requestLocationFromMiniApp);
        }
        if (actions) actions.innerHTML = '';
      }

      function currentService() {
        return state.services[state.currentIndex] || null;
      }

      function renderSwipeContent() {
        const container = document.getElementById('stackArea');
        const actions = document.getElementById('swipeActions');
        if (!container || !actions) return;

        if (state.contactResult) {
          renderContactResult(container, actions);
          return;
        }

        const svc = currentService();
        if (!svc) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="ring glass">${icons.heartStroke}</div>
              <h3>You've seen everyone nearby</h3>
              <p>No more approved providers match right now. Check again soon.</p>
              <button class="btn-primary" type="button" id="refreshDeckBtn">Refresh deck</button>
            </div>`;
          actions.innerHTML = '';
          document.getElementById('refreshDeckBtn').addEventListener('click', () => loadSwipeServices(true));
          return;
        }

        const visible = state.services.slice(state.currentIndex, state.currentIndex + 3).filter(Boolean);
        container.innerHTML = visible.slice().reverse().map((item, reverseIndex) => {
          const depth = visible.length - 1 - reverseIndex;
          return buildSwipeCard(item, depth);
        }).join('');
        bindCarousels(container);
        bindLikeStatus(container);
        const top = container.querySelector('.swipe-card[data-depth="0"]');
        attachDrag(top);
        if (top) {
          top.addEventListener('dblclick', () => showCardDetail(svc, 'swipe'));
        }

        if (svc.is_own) {
          actions.innerHTML = `
            <button class="pass glass" id="btnPass" type="button" aria-label="Pass">${icons.x}</button>
          `;
          document.getElementById('btnPass').addEventListener('click', () => flyOffSwipe('left', 'pass'));
        } else {
          actions.innerHTML = `
            <button class="pass glass" id="btnPass" type="button" aria-label="Pass">${icons.x}</button>
            <button class="save glass" id="btnSave" type="button" aria-label="Save">${icons.bookmark}</button>
            <button class="like" id="btnLike" type="button" aria-label="${userIsPureProvider() ? 'Save' : 'Like'}">${icons.heart}</button>
          `;
          document.getElementById('btnPass').addEventListener('click', () => flyOffSwipe('left', 'dislike'));
          document.getElementById('btnSave').addEventListener('click', () => flyOffSwipe('right', 'save'));
          document.getElementById('btnLike').addEventListener('click', () => flyOffSwipe('right', 'like'));
        }
      }

      function buildSwipeCard(svc, depth) {
        const scale = 1 - depth * 0.045;
        const ty = depth * 12;
        const hasPhotos = sortedPhotos(svc).length > 0;
        const heroStyle = hasPhotos ? '' : ` style="background:${categoryGradient(svc)}"`;
        const stamp = serviceStatusText(svc);
        const effectClass = serviceEffectClass(svc);
        const categoryName = svc.category ? svc.category.name : 'Service';
        const distanceText = serviceDistanceText(svc);
        const rawDescription = String(svc.description || 'No description provided.').trim();
        const shortDescription = rawDescription.length > 30 ? rawDescription.slice(0, 30).trimEnd() + '...' : rawDescription;
        return `
          <div class="swipe-card glass ${escAttr(effectClass)}" data-depth="${depth}" data-id="${escAttr(svc.id)}" style="transform:translateY(${ty}px) scale(${scale});z-index:${10 - depth};opacity:${depth > 2 ? 0 : 1}">
            <div class="hero"${heroStyle}>
              ${renderHeroMedia(svc, 'swipe-' + svc.id + '-' + depth, depth === 0)}
              <span class="stamp">${icons.heart}<span>${escHtml(stamp)}</span></span>
              <span class="cat-badge">${escHtml(categoryInitials(svc))}</span>
              <div class="swipe-flag like">${userIsPureProvider() ? 'SAVE' : 'LIKE'}</div>
              <div class="swipe-flag pass">PASS</div>
            </div>
            <div class="info">
              <div class="swipe-summary">
                <div class="swipe-summary-left">
                  <h2>${escHtml(svc.title || 'Service')}</h2>
                  <div class="swipe-meta-line">${escHtml(categoryName)} / ${escHtml(distanceText)}</div>
                </div>
                <div class="swipe-summary-desc">
                  <p class="desc">${escHtml(shortDescription)}</p>
                </div>
              </div>
              ${renderPriceStack(svc, true)}
              <div class="stats">
                <div><span class="v">${escHtml((svc.likes_count || 0) + ' likes')}</span><span class="l">Likes</span></div>
                <div><span class="v">${escHtml(stamp)}</span><span class="l">Status</span></div>
              </div>
              ${renderLikeStatus(svc)}
              <div id="contactStatusRow">${renderContactStatusRow(svc._contactStatus)}</div>
            </div>
          </div>
        `;
      }

      function attachDrag(card) {
        if (!card) return;
        let startX = 0;
        let startY = 0;
        let dx = 0;
        let dy = 0;
        let dragging = false;
        const likeFlag = card.querySelector('.swipe-flag.like');
        const passFlag = card.querySelector('.swipe-flag.pass');

        function pointerDown(event) {
          if (event.target && event.target.closest('.media-nav, .emoji-slot')) return;
          dragging = true;
          const point = event.touches ? event.touches[0] : event;
          startX = point.clientX;
          startY = point.clientY;
          card.style.transition = 'none';
        }

        function pointerMove(event) {
          if (!dragging) return;
          const point = event.touches ? event.touches[0] : event;
          dx = point.clientX - startX;
          dy = point.clientY - startY;
          const rot = dx / 18;
          card.style.transform = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + rot + 'deg)';
          const progress = Math.min(Math.abs(dx) / 120, 1);
          if (dx > 0) {
            if (likeFlag) likeFlag.style.opacity = progress;
            if (passFlag) passFlag.style.opacity = 0;
          } else if (dx < 0) {
            if (passFlag) passFlag.style.opacity = progress;
            if (likeFlag) likeFlag.style.opacity = 0;
          }
        }

        function pointerUp() {
          if (!dragging) return;
          dragging = false;
          card.style.transition = 'transform .35s cubic-bezier(.2,.9,.3,1)';
          if (Math.abs(dx) > 110) {
            flyOffSwipe(dx > 0 ? 'right' : 'left', dx > 0 ? 'like' : 'dislike');
          } else {
            card.style.transform = 'translate(0,0) rotate(0)';
            if (likeFlag) likeFlag.style.opacity = 0;
            if (passFlag) passFlag.style.opacity = 0;
          }
          dx = 0;
          dy = 0;
        }

        card.addEventListener('pointerdown', pointerDown);
        card.addEventListener('pointermove', pointerMove);
        card.addEventListener('pointerup', pointerUp);
        card.addEventListener('pointerleave', () => { if (dragging) pointerUp(); });
      }

      function flyOffSwipe(dir, action) {
        const card = document.querySelector('.swipe-card[data-depth="0"]');
        const tx = dir === 'right' ? window.innerWidth + 120 : -(window.innerWidth + 120);
        if (card) {
          card.style.transition = 'transform .4s cubic-bezier(.2,.9,.3,1), opacity .4s ease';
          card.style.transform = 'translate(' + tx + 'px,-10px) rotate(' + (dir === 'right' ? 18 : -18) + 'deg)';
          card.style.opacity = '0';
        }
        swipeAction(action);
        setTimeout(advanceToNextCard, 260);
      }

      function swipeAction(action) {
        const svc = currentService();
        if (!svc) return Promise.resolve();
        const serviceId = svc.id;

        if (action === 'like') {
          if (userIsPureProvider()) {
            return saveServiceById(serviceId).then(() => {
              showToast('Saved. Provider accounts browse without sending contact requests.', 'success');
            });
          }
          return fetchApi('/swipe/like/', { method: 'POST', body: JSON.stringify({ service_id: serviceId }) })
            .then(res => {
              if (res && res.provider_protection) {
                state.usageInfo = res.provider_protection;
                renderUsageBar(state.usageInfo);
              }
              if (res && res.success) {
                const cr = res.contact_request || {};
                showContactResultToast({ status: cr.status || 'approved' });
              } else if (res && res.provider_protection) {
                showUsageLimitModal(res.provider_protection);
              } else if (res && res.error) {
                showToast(res.error, 'error');
              }
            })
            .catch(() => showToast('Network error', 'error'));
        }

        if (action === 'save') {
          return saveServiceById(serviceId).then(() => showToast('Saved for later', 'success'));
        }

        if (action === 'dislike' || action === 'pass') {
          return fetchApi('/swipe/dislike/', { method: 'POST', body: JSON.stringify({ service_id: serviceId }) })
            .then(res => { if (!res.success && res.error) showToast(res.error, 'error'); })
            .catch(() => {});
        }

        return Promise.resolve();
      }

      function saveServiceById(serviceId) {
        return fetchApi('/swipe/save/', { method: 'POST', body: JSON.stringify({ service_id: serviceId }) })
          .then(res => {
            if (!res.success && res.error) showToast(res.error, 'error');
            loadSavedServices(true);
            return res;
          })
          .catch(() => showToast('Network error', 'error'));
      }

      function advanceToNextCard() {
        if (state.currentIndex + 1 < state.services.length) {
          state.currentIndex += 1;
          renderSwipeContent();
          preloadFirstPhoto(state.services[state.currentIndex + 1]);
          if (state.services.length - state.currentIndex <= 2) prefetchNextCard();
          return;
        }
        if (state._swipeNextCards && state._swipeNextCards.length) {
          state.services = state._swipeNextCards;
          state.currentIndex = 0;
          state._swipeNextCards = [];
          renderSwipeContent();
          preloadFirstPhoto(state.services[1]);
          if (state.services.length <= 2) prefetchNextCard();
          return;
        }
        state.services = [];
        state.currentIndex = 0;
        const container = document.getElementById('stackArea');
        const actions = document.getElementById('swipeActions');
        if (container) container.innerHTML = '<div class="empty-state"><div class="spinner"></div><h3>Finding more...</h3><p style="color:var(--ink-mute);font-size:13px;margin:0;max-width:250px;line-height:1.5">Loading next providers near you</p></div>';
        if (actions) actions.innerHTML = '';
        loadSwipeServices(false);
      }

      function prefetchNextCard() {
        if (state._swipeNextCards && state._swipeNextCards.length) return;
        const current = currentService();
        const query = buildSwipeDiscoveryQuery(current ? { exclude_service_id: current.id, batch_size: SWIPE_BATCH_SIZE } : { batch_size: SWIPE_BATCH_SIZE });
        fetchApi('/discovery/swipe/' + query)
          .then(res => {
            if (res.provider_protection) {
              state.usageInfo = res.provider_protection;
              renderUsageBar(state.usageInfo);
            }
            const cards = res.success ? ((res.cards && res.cards.length) ? res.cards : (res.card ? [res.card] : [])) : [];
            if (cards.length) {
              state._swipeNextCards = cards;
              cards.forEach(rememberSwipeCard);
              preloadFirstPhoto(cards[0]);
            }
          })
          .catch(() => {});
      }

      function renderContactResult(container, actions) {
        const cr = state.contactResult || {};
        let title = 'Done';
        let msg = 'Action completed successfully.';
        if (cr.status === 'provider_pending') {
          title = 'Request Sent';
          msg = 'Waiting for the provider response.';
        } else if (cr.status === 'pending') {
          title = 'Under Review';
          msg = 'Your request is being reviewed by the admin team.';
        } else if (cr.status === 'approved' || cr.status === 'auto_approved') {
          title = 'Contact Approved';
          msg = 'The approved contact details will be shared through the bot, not on this page.';
        } else if (cr.status === 'rejected' || cr.status === 'provider_rejected') {
          title = 'Not Available';
          msg = 'This provider is not available. Try another service.';
        }
        container.innerHTML = `<div class="empty-state"><div class="ring glass">${icons.check}</div><h3>${escHtml(title)}</h3><p>${escHtml(msg)}</p></div>`;
        actions.innerHTML = '<button class="btn-primary" type="button" id="continueSwipingBtn">Keep Swiping</button>';
        document.getElementById('continueSwipingBtn').addEventListener('click', () => {
          state.contactResult = null;
          advanceToNextCard();
        });
      }

      function renderSaved() {
        state.screen = 'saved';
        renderPhone(`
          ${renderSubtop('Saved', state.savedServices.length + ' saved', 'home')}
          <div id="savedContent">
            <div class="empty-state"><div class="spinner"></div><p>Loading saved services...</p></div>
          </div>
        `, 'saved');
        loadSavedServices(false);
      }

      function loadSavedServices(silent) {
        return fetchApi('/swipe/saved/')
          .then(res => {
            if (res.success && Array.isArray(res.services)) {
              state.savedServices = res.services;
            }
            updateSavedCounts();
            if (!silent && state.screen === 'saved') renderSavedList();

          .catch(() => {
            if (!silent && state.screen === 'saved') {
              const box = document.getElementById('savedContent');
              if (box) box.innerHTML = '<div class="empty-state"><div class="ring glass">!</div><h3>Could not load saved</h3><p>Try again later.</p></div>';

          });

      function updateSavedCounts() {
        const text = state.savedServices.length + ' saved';
        const home = document.getElementById('savedCountLabel');
        if (home) home.textContent = text;
        const pill = document.querySelector('#screen-saved .count-pill');
        if (pill) pill.textContent = text;
      }

      function renderSavedList() {
        const box = document.getElementById('savedContent');
        if (!box) return;
        if (!state.savedServices.length) {
          box.innerHTML = `
            <div class="empty-state">
              <div class="ring glass">${icons.saved}</div>
              <h3>No saved services</h3>
              <p>Services you save while discovering will show up here for quick access.</p>
              <button class="btn-primary" type="button" id="goDiscoverFromSaved">Discover services</button>
            </div>`;
          document.getElementById('goDiscoverFromSaved').addEventListener('click', () => navigate('swipe'));
          return;
        }
        box.innerHTML = '<div class="saved-list">' + state.savedServices.map(svc => `
          <div class="saved-card glass" data-id="${escAttr(svc.id)}">
            ${renderPhotoOrInitial(svc, 'thumb')}
            <div class="body">
              <h4>${escHtml(svc.title || 'Service')}</h4>
              <p>${escHtml(serviceMeta(svc))} / ${escHtml(priceSummary(svc))}</p>
              ${renderLikeStatus(svc)}
            </div>
            <button class="remove" type="button" aria-label="Remove" data-remove="${escAttr(svc.id)}">${icons.x}</button>
          </div>
        `).join('') + '</div>';
        box.querySelectorAll('[data-remove]').forEach(btn => {
          btn.addEventListener('click', event => {
            event.stopPropagation();
            const serviceId = btn.getAttribute('data-remove');
            fetchApi('/swipe/save/' + encodeURIComponent(serviceId) + '/', { method: 'DELETE' })
              .then(res => {
                if (res.success) {
                  state.savedServices = state.savedServices.filter(svc => String(svc.id) !== String(serviceId));
                  updateSavedCounts();
