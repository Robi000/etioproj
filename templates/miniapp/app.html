              <button class="btn btn-primary" id="detailContactBtn">💬 Contact Provider</button>
              <button class="btn btn-amber" id="detailLikeBtn">❤️ Like</button>
            </div>
          </div>
        `);

        initDetailCarousel(photos);
        bindDetailButtons(svc);
        loadDetailContactStatus(svc.id);
      }

      function backFromDetail() {
        const previous = window.app && window.app._prevScreen && window.app._prevScreen !== 'card_detail'
          ? window.app._prevScreen
          : 'swipe';
        navigate(previous);
      }

      function initDetailCarousel(photos) {
        if (!photos || photos.length <= 1) return;
        const inner = document.getElementById('detailCarouselInner');
        const dots = document.querySelectorAll('#detailCarouselDots .dot');
        if (!inner) return;
        let startX = 0, currentX = 0, isDragging = false, idx = 0;

        function goTo(index) {
          idx = Math.max(0, Math.min(index, photos.length - 1));
          inner.style.transform = 'translateX(-' + (idx * 100) + '%)';
          dots.forEach((d, i) => d.classList.toggle('active', i === idx));
        }

        inner.addEventListener('touchstart', e => {
          startX = e.touches[0].clientX;
          isDragging = true;
          inner.classList.add('dragging');
        }, { passive: true });

        inner.addEventListener('touchmove', e => {
          if (!isDragging) return;
          currentX = e.touches[0].clientX - startX;
          const base = -idx * inner.offsetWidth;
          inner.style.transform = 'translateX(' + (base + currentX) + 'px)';
        }, { passive: true });

        inner.addEventListener('touchend', () => {
          if (!isDragging) return;
          isDragging = false;
          inner.classList.remove('dragging');
          if (Math.abs(currentX) > 60) {
            goTo(currentX < 0 ? idx + 1 : idx - 1);
          } else {
            goTo(idx);
          }
          currentX = 0;
        }, { passive: true });
      }

      function showLocationPromptInline() {
        const container = document.getElementById('detailContactStatus');
        if (!container) return;
        const deepLink = getBotDeepLink('share_location');
        container.innerHTML = `
          <div class="location-inline-prompt">
            <div>📍 Share your location to find nearby providers.</div>
            <button class="btn btn-primary" onclick="requestLocationFromMiniApp()" style="margin-top:8px;width:100%">📍 Share GPS Location</button>
            ${deepLink ? `<div style="margin-top:6px;font-size:13px"><a href="${escHtml(deepLink)}" target="_blank">Or open bot to share</a></div>` : ''}
            <div id="locationError" style="color:var(--color-danger);margin-top:6px;font-size:13px;display:none"></div>
          </div>
        `;
      }

      function requestLocationFromMiniApp() {
        requestLocationFromMiniAppAsync().then(function(result) {
          if (result) sendCustomerLocation(result.latitude, result.longitude);
        });
      }

      function requestLocationFromMiniAppAsync() {
        return new Promise(function(resolve) {
          if (tg && typeof tg.requestLocation === 'function') {
            tg.onEvent('locationRequested', function onLocation(result) {
              tg.offEvent('locationRequested', onLocation);
              if (result && result.latitude && result.longitude) {
                resolve({ latitude: result.latitude, longitude: result.longitude });
              } else {
                resolve(null);
              }
            });
            tg.requestLocation();
          } else if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              function(pos) { resolve({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }); },
              function() { resolve(null); },
              { enableHighAccuracy: true, timeout: 10000 }
            );
          } else {
            resolve(null);
          }
        });
      }

      function sendCustomerLocation(lat, lon) {
        const errorEl = document.getElementById('locationError');
        return fetchApi('/profile/customer-location/', {
          method: 'PATCH',
          body: JSON.stringify({ latitude: lat, longitude: lon })
        }).then(res => {
          if (res.success) {
            state.user = state.user || {};
            state.user.has_customer_location = true;
            const container = document.getElementById('detailContactStatus');
            if (container) container.innerHTML = '<div style="padding:12px;color:var(--color-success);text-align:center">✅ Location saved! You can now contact providers.</div>';
            return true;
          } else {
            if (errorEl) { errorEl.textContent = res.errors ? JSON.stringify(res.errors) : 'Failed to save location.'; errorEl.style.display = 'block'; }
            return false;
          }
        }).catch(() => {
          if (errorEl) { errorEl.textContent = 'Network error. Try again.'; errorEl.style.display = 'block'; }
          return false;
        });
      }

      function customerHasLocation() {
        return fetchApi('/me/')
          .then(res => {
            if (res.success && res.user) {
              state.user = res.user;
              return Boolean(res.user.has_customer_location);
            }
            return Boolean(state.user && state.user.has_customer_location);
          })
          .catch(() => Boolean(state.user && state.user.has_customer_location));
      }

      function openBudgetSheet(svc) {
        closeBudgetSheet();

        const backdrop = document.createElement('div');
        backdrop.id = 'budgetSheetBackdrop';
        backdrop.className = 'budget-sheet-backdrop';
        backdrop.innerHTML = `
          <div class="budget-sheet" role="dialog" aria-modal="true" aria-labelledby="budgetSheetTitle">
            <div class="budget-sheet-header">
              <div class="budget-sheet-title" id="budgetSheetTitle">Set your budget for this service.</div>
              <button class="budget-sheet-close" id="budgetSheetClose" type="button" aria-label="Close">×</button>
            </div>
            <label class="budget-field-label" for="budgetInput">Budget in ETB</label>
            <input class="budget-input" id="budgetInput" type="number" min="1000" step="50" inputmode="numeric" value="1000">
            <div class="budget-average" id="budgetAverage">${renderAverageLine(svc, {}, true)}</div>
            <div class="budget-error" id="budgetError"></div>
            <div class="budget-sheet-actions">
              <button class="btn btn-secondary" id="budgetCancelBtn" type="button">Cancel</button>
              <button class="btn btn-primary" id="budgetConfirmBtn" type="button">Contact Provider</button>
            </div>
          </div>
        `;
        document.body.appendChild(backdrop);
        requestAnimationFrame(() => backdrop.classList.add('show'));

        const averageEl = document.getElementById('budgetAverage');
        const errorEl = document.getElementById('budgetError');
        const input = document.getElementById('budgetInput');
        const confirm = document.getElementById('budgetConfirmBtn');

        document.getElementById('budgetSheetClose').addEventListener('click', closeBudgetSheet);
        document.getElementById('budgetCancelBtn').addEventListener('click', closeBudgetSheet);
        backdrop.addEventListener('click', event => {
          if (event.target === backdrop) closeBudgetSheet();
        });

        const categoryId = svc.category ? svc.category.id : null;
        if (categoryId) {
          fetchApi('/services/category-avg-price/?category_id=' + encodeURIComponent(categoryId))
            .then(res => {
              if (res.success && averageEl) {
                averageEl.textContent = renderAverageLine(svc, res.averages || {}, false);
              } else if (averageEl) {
                averageEl.textContent = renderAverageLine(svc, {}, false);
              }
            })
            .catch(() => {
              if (averageEl) averageEl.textContent = renderAverageLine(svc, {}, false);
            });
        } else if (averageEl) {
          averageEl.textContent = renderAverageLine(svc, {}, false);
        }

        confirm.addEventListener('click', () => {
          const budget = Number(input.value || 0);
          if (budget < 1000) {
            errorEl.textContent = 'Minimum budget is 1000 ETB.';
            input.focus();
            return;
          }
          errorEl.textContent = '';
          confirm.disabled = true;
          submitContactRequest(svc)
            .finally(() => {
              confirm.disabled = false;
            });
        });
        input.focus();
        input.select();
      }

      function submitContactRequest(svc) {
        return fetchApi('/contact-request/', { method: 'POST', body: JSON.stringify({ service_id: svc.id }) })
          .then(res => {
            if (res.success) {
              closeBudgetSheet();
              const cr = res.contact_request || {};
              updateDetailContactStatus(cr.status, contactValueFromRequest(cr));
              showToast('Contact request sent!', 'success');
            } else if (res.error === 'LOCATION_REQUIRED') {
              closeBudgetSheet();
              showLocationPromptInline();
            } else {
              showToast(res.error || 'Request failed', 'error');
            }
          });
      }

      function bindDetailButtons(svc) {
        document.getElementById('detailSaveBtn').addEventListener('click', () => {
          fetchApi('/swipe/save/', { method: 'POST', body: JSON.stringify({ service_id: svc.id }) })
            .then(res => {
              if (res.success) showToast('Service saved!', 'success');
              else showToast(res.error || 'Failed to save', 'error');
            });
        });

        document.getElementById('detailContactBtn').addEventListener('click', () => {
          customerHasLocation()
            .then(hasLocation => {
              if (!hasLocation) {
                showLocationPromptInline();
                return;
              }
              openBudgetSheet(svc);
            });
        });

        document.getElementById('detailLikeBtn').addEventListener('click', () => {
          fetchApi('/swipe/like/', { method: 'POST', body: JSON.stringify({ service_id: svc.id }) })
            .then(res => {
              if (res.provider_protection) {
                state.usageInfo = res.provider_protection;
              }
              if (res.success) {
                const cr = res.contact_request || {};
                const status = cr.status || 'approved';
                const contactValue = contactValueFromRequest(cr);
                updateDetailContactStatus(status, contactValue);
                showContactResultToast({ status });
              } else if (res.provider_protection) {
                showUsageLimitModal(res.provider_protection);
              } else {
                showToast(res.error || 'Failed to like', 'error');
              }
            });
        });
      }

      function loadDetailContactStatus(serviceId) {
        fetchApi('/contact-request/status/?service_id=' + serviceId)
          .then(res => {
            if (res.success && res.contact_request) {
              const cr = res.contact_request;
              const contactValue = contactValueFromRequest(cr);
              updateDetailContactStatus(cr.status, contactValue);
            }
          })
          .catch(() => {});
      }

      function updateDetailContactStatus(status, contactValue) {
        const container = document.getElementById('detailContactStatus');
        if (!container) return;
        const contactStatus = contactStatusLabel(status, contactValue);
        if (contactStatus.label) {
          container.innerHTML = '<div class="detail-contact-status ' + contactStatus.cls + '">' + escHtml(contactStatus.label) + '</div>';
        }
      }

      /* ── render: saved ──────────────────────────── */
      function renderSaved() {
        renderApp(`
          <div class="screen active">
            <div class="header">
              <button class="header-back" onclick="window.app.navigate('home')">‹</button>
              <span class="header-title">Saved Services</span>
            </div>
            <div class="scroll-content" id="savedContent">
              <div style="text-align:center;padding:40px"><div class="spinner" style="margin:0 auto"></div></div>
            </div>
          </div>
        `);
        loadSavedServices();
      }

      function loadSavedServices() {
        fetchApi('/swipe/saved/')
          .then(res => {
            const container = document.getElementById('savedContent');
            if (!container) return;
            if (res.success && res.services && res.services.length) {
              let html = '<div class="saved-list">';
              res.services.forEach(svc => {
                const photos = [...(svc.photos || [])].sort((a, b) => a.order_index - b.order_index);
                const prices = svc.prices || [];
                const priceMin = prices.length ? Math.min(...prices.map(p => parseFloat(p.amount) || 0)) : null;
                html += `
                  <div class="saved-card" data-id="${svc.id}">
                    <div class="saved-card-image">
                      ${renderImageOrPlaceholder(photos[0])}
                    </div>
                    <div class="saved-card-body">
                      <div class="saved-provider">
                        ${escHtml(svc.provider_name || 'Provider')}
                        ${renderProviderBadges(svc)}
                      </div>
                      <h4>${escHtml(svc.title)}</h4>
                      ${svc.category ? '<div class="saved-category">' + escHtml(svc.category.name) + '</div>' : ''}
                      <div class="saved-bottom">
                        <span class="saved-price">${priceMin !== null ? 'From ' + priceMin + ' ETB' : ''}</span>
                        ${svc.saved_at ? '<span class="saved-at">Saved ' + timeAgo(svc.saved_at) + '</span>' : '<span></span>'}
                      </div>
                      <div class="saved-card-actions">
                        <span class="saved-card-likes">❤️ ${svc.likes_count || 0}</span>
                        <button class="saved-card-remove" data-sid="${svc.id}" title="Remove">❌ Remove</button>
                      </div>
                    </div>
                  </div>
                `;
              });
              html += '</div>';
              container.innerHTML = html;
              container.querySelectorAll('.saved-card-remove').forEach(btn => {
                btn.addEventListener('click', function (e) {
                  e.stopPropagation();
                  const sid = parseInt(this.dataset.sid);
                  fetchApi('/swipe/save/' + sid + '/', { method: 'DELETE' })
                    .then(res => {
                      if (res.success) { showToast('Removed', 'success'); loadSavedServices(); }
                      else showToast('Failed to remove', 'error');
                    });
                });
              });
              container.querySelectorAll('.saved-card').forEach(card => {
                card.addEventListener('click', function () {
                  const id = parseInt(this.dataset.id);
                  const svc = res.services.find(s => s.id === id);
                  if (svc) showCardDetail(svc);
                });
              });
            } else {
              container.innerHTML = '<div class="saved-empty"><div class="empty-icon">💾</div><p>No saved services. Like or save services to add them here.</p><button class="btn btn-primary" style="margin-top:12px" onclick="window.app.navigate(\'swipe\')">Discover Services</button></div>';
            }
          })
          .catch(() => {
            const container = document.getElementById('savedContent');
            if (container) container.innerHTML = '<div class="saved-empty"><div class="empty-icon">⚠️</div><p>Failed to load saved services</p></div>';
          });
      }

      /* ── render: my service ──────────────────────── */
      function renderMyService() {
        renderApp(`
          <div class="screen active">
            <div class="header">
              <button class="header-back" onclick="window.app.navigate('home')">‹</button>
              <span class="header-title">My Service</span>
            </div>
            <div class="scroll-content" id="myServiceContent">
              <div style="text-align:center;padding:40px"><div class="spinner" style="margin:0 auto"></div></div>
            </div>
          </div>
        `);
        if (!userCanManageService()) {
          const container = document.getElementById('myServiceContent');
          const deepLink = getBotDeepLink('create_service');
          if (container) {
            container.innerHTML = `
              <div class="my-service-empty">
                <div class="empty-icon">📋</div>
                <p>My Service is available for providers.</p>
                <p style="font-size:13px;margin-top:4px">Use the bot to register a provider service.</p>
                ${deepLink ? `<a class="btn btn-primary" style="margin-top:16px" href="${escHtml(deepLink)}" target="_blank">Open Bot</a>` : ''}
              </div>
            `;
          }
          return;
        }
        loadMyService();
      }

      function renderMyServiceStatusBlock(s) {
        const status = String(s.approval_status || '').toLowerCase();
        if (status === 'approved') {
          const isOn = s.visibility_status === 'on';
          return `
            <div class="visibility-control">
              <div class="visibility-copy">
                <strong>Visibility</strong>
                <span>${isOn ? 'Your approved service is visible in discovery.' : 'Your approved service is hidden from discovery.'}</span>
              </div>
              <button class="visibility-toggle ${isOn ? 'on' : 'off'}" id="visibilityToggleBtn" type="button" aria-pressed="${isOn ? 'true' : 'false'}">
                <span class="visibility-dot"></span>
                <span>${isOn ? 'On' : 'Off'}</span>
              </button>
            </div>
            <div class="service-state-note approved">Approved services can be turned on or off anytime.</div>
          `;
        }
        if (status === 'rejected') {
          const deepLink = getBotDeepLink('create_service');
          return `
            <div class="service-state-note rejected">Rejected</div>
            <div class="rejection-box">
              <strong>Rejection reason</strong>
              <p>${escHtml(s.rejection_reason || 'No reason provided.')}</p>
              ${deepLink ? `<a class="btn btn-primary" href="${escHtml(deepLink)}" target="_blank">📝 Register Again</a>` : '<button class="btn btn-secondary" disabled>📝 Register Again</button>'}
            </div>
          `;
        }
        return '<div class="service-state-note pending">Your service is being reviewed by admin.</div>';
      }

      function updateProfileVisibility(nextStatus) {
        const toggle = document.getElementById('visibilityToggleBtn');
        if (toggle) toggle.disabled = true;
        return fetchApi('/profile/visibility/', {
          method: 'POST',
          body: JSON.stringify({ visibility_status: nextStatus }),
        })
          .then(res => {
            if (res.success) {
              if (state.myService) state.myService.visibility_status = res.visibility_status || nextStatus;
              showToast('Visibility updated', 'success');
              loadMyService();
            } else {
              showToast(res.error || 'Failed to update visibility', 'error');
            }
          })
          .catch(() => {
            showToast('Network error', 'error');
          })
          .finally(() => {
            if (toggle) toggle.disabled = false;
          });
      }

      function loadMyService() {
        fetchApi('/service/me/')
          .then(res => {
            const container = document.getElementById('myServiceContent');
            if (!container) return;
            if (res.success && res.service) {
              state.myService = res.service;
              const s = res.service;
              const prices = s.prices || [];
              const photos = [...(s.photos || [])].sort((a, b) => a.order_index - b.order_index);
              const statusClass = (s.approval_status || '').toLowerCase();
              container.innerHTML = `
                <div class="my-service-card">
                  <div class="my-service-image">
                    ${renderImageOrPlaceholder(photos[0])}
                  </div>
                  <div class="my-service-body">
                    <div class="my-service-title-row">
                      <h2>${escHtml(s.title)}</h2>
                      <span class="status-badge ${statusClass}">${serviceStatusLabel(s.approval_status)}</span>
                    </div>
                    ${renderMyServiceStatusBlock(s)}
                    <div class="divider"></div>
                    <div class="my-service-fields">
                      <div><span class="label">Category</span><div class="value">${s.category ? escHtml(s.category.name) : '-'}</div></div>
                      <div><span class="label">Location</span><div class="value">${escHtml(s.city_text || 'GPS location')}</div></div>
                      ${prices.length ? '<div><span class="label">Pricing</span>' + prices.map(p => '<div class="value">' + formatPrice(p) + '</div>').join('') + '</div>' : ''}
                      <div><span class="label">Description</span><div class="value">${escHtml(s.description || '-')}</div></div>
                      <div><span class="label">Photos</span><div class="value">${photos.length}</div></div>
                    </div>
                  </div>
                </div>
              `;
              const toggle = document.getElementById('visibilityToggleBtn');
              if (toggle) {
                toggle.addEventListener('click', () => {
                  const nextStatus = s.visibility_status === 'on' ? 'off' : 'on';
                  updateProfileVisibility(nextStatus);
                });
              }
            } else {
              const deepLink = getBotDeepLink('create_service');
              container.innerHTML = `
                <div class="my-service-empty">
                  <div class="empty-icon">🏪</div>
                  <p>You haven't created a service yet.</p>
                  <p style="font-size:13px;margin-top:4px">Use the bot to register as a provider and create your service.</p>
                  ${deepLink ? `<a class="btn btn-primary" style="margin-top:16px" href="${escHtml(deepLink)}" target="_blank">Open Bot</a>` : '<button class="btn btn-secondary" style="margin-top:16px" disabled>Open Bot</button>'}
                </div>
              `;
            }
          })
          .catch(() => {
            const container = document.getElementById('myServiceContent');
            if (container) container.innerHTML = '<div class="my-service-empty"><div class="empty-icon">⚠️</div><p>Failed to load your service</p></div>';
          });
      }

      /* ── navigation ────────────────────────────── */
      function navigate(screen) {
        state.screen = screen;
        window.app._prevScreen = screen;

        const screens = ['loading', 'policy_gate', 'home', 'swipe', 'card_detail', 'saved', 'my_service'];
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));

        switch (screen) {
          case 'loading': renderLoading(); break;
          case 'policy_gate': renderPolicyGate(); break;
          case 'home': renderHome(); break;
          case 'swipe':
            renderSwipe();
            break;
          case 'saved': renderSaved(); break;
          case 'my_service': renderMyService(); break;
          default: renderHome();
        }
      }

      /* ── utilities ────────────────────────────── */
      function escHtml(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function timeAgo(dateStr) {
        if (!dateStr) return '';
        const now = Date.now();
        const then = new Date(dateStr).getTime();
        const diff = now - then;
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'just now';
        if (mins < 60) return mins + 'm ago';
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h ago';
        const days = Math.floor(hrs / 24);
        if (days < 30) return days + 'd ago';
        return new Date(dateStr).toLocaleDateString();
      }

      /* ── init ───────────────────────────────────── */
      async function init() {
        renderLoading();

        const initData = tg ? tg.initData : null;
        if (!initData) {
          renderError('This app must be opened from Telegram.');
          return;
        }

        const authRes = await fetchApi('/auth/telegram/', {
          method: 'POST',
          body: JSON.stringify({ init_data: initData }),
        });

        if (!authRes.success) {
          renderError(authRes.error || 'Authentication failed.');
          return;
        }

        state.token = authRes.token;
        state.user = authRes.user;

        const meRes = await fetchApi('/me/');
        if (meRes.success && meRes.user) {
          state.user = meRes.user;
        }

        if (!state.user.policy_accepted_at) {
          navigate('policy_gate');
          return;
        }

        const catRes = await fetchApi('/services/categories/');
        if (catRes.success && catRes.categories) {
          state.categories = catRes.categories;
        }

        if (!state.user.has_customer_location) {
          const loc = await requestLocationFromMiniAppAsync();
          if (loc) {
            await sendCustomerLocation(loc.latitude, loc.longitude);
          }
        }

        const categoryParam = parseInt(qs('category_id'), 10);
        if (categoryParam > 0) {
          state.filters.category_id = categoryParam;
        }

        const screenParam = qs('screen') || 'home';
        const validScreens = {
          'my-service': 'my_service',
          'saved': 'saved',
          'discovery': 'swipe',
          'swipe': 'swipe',
          'home': 'home',
        };
        const targetScreen = validScreens[screenParam] || 'home';
        navigate(targetScreen);
      }

      document.getElementById('usageModalBackdrop').addEventListener('click', function (e) {
        if (e.target === this) closeUsageLimitModal();
      });
      document.getElementById('usageModalCloseBtn').addEventListener('click', closeUsageLimitModal);

      /* ── exports ────────────────────────────────── */
      window.app = {
        navigate: navigate,
        loadSwipeServices: loadSwipeServices,
        continueSwiping: continueSwiping,
        showCardDetail: showCardDetail,
        backFromDetail: backFromDetail,
        changeSwipePhoto: changeSwipePhoto,
        _prevScreen: 'home',
        state: state,
      };

      document.addEventListener('DOMContentLoaded', init);
      if (document.readyState !== 'loading') init();
    })();
  </script>
</body>
