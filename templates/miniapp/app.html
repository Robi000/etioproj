<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="bot-username" content="{{ bot_username }}">
  <title>Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: rgba(255,255,255,0.07);
      --surface-hover: rgba(255,255,255,0.12);
      --border: rgba(255,255,255,0.1);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --teal: #14b8a6;
      --teal-glow: rgba(20,184,166,0.25);
      --amber: #f59e0b;
      --amber-glow: rgba(245,158,11,0.25);
      --red: #ef4444;
      --radius-card: 16px;
      --radius-pill: 999px;
      --radius-sm: 10px;
      --font: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      --ease: 150ms ease;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html.light {
      --bg: #f1f5f9;
      --surface: rgba(255,255,255,0.85);
      --surface-hover: rgba(255,255,255,0.95);
      --border: rgba(0,0,0,0.08);
      --text: #0f172a;
      --text-muted: #475569;
      --text-dim: #94a3b8;
    }
    html, body {
      height: 100%; width: 100%;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #app { height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; }
    .screen { display: none; flex: 1; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
    .screen.active { display: flex; }
    .screen::-webkit-scrollbar { width: 4px; }
    .screen::-webkit-scrollbar-track { background: transparent; }
    .screen::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 4px; }

    /* Loading */
    .loading-screen { align-items: center; justify-content: center; gap: 20px; padding: 40px 24px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-muted); font-size: 14px; }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px calc(12px + var(--safe-bottom));
      background: var(--surface);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
      flex-shrink: 0;
    }
    .header-title { font-size: 17px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-back {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 18px; cursor: pointer;
      transition: background var(--ease); flex-shrink: 0;
    }
    .header-back:hover, .header-back:active { background: var(--surface-hover); }
    .header-action {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 16px; cursor: pointer;
      transition: all var(--ease); flex-shrink: 0;
    }
    .header-action:hover, .header-action:active { background: var(--surface-hover); color: var(--text); }

    /* Scroll content */
    .scroll-content { flex: 1; overflow-y: auto; padding: 16px 16px calc(24px + var(--safe-bottom)); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 24px; border-radius: var(--radius-pill);
      font-family: var(--font); font-size: 15px; font-weight: 600;
      border: none; cursor: pointer; transition: all var(--ease);
      text-decoration: none; white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--teal); color: #fff; }
    .btn-primary:hover { box-shadow: 0 0 20px var(--teal-glow); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface-hover); }
    .btn-amber { background: var(--amber); color: #fff; }
    .btn-amber:hover { box-shadow: 0 0 20px var(--amber-glow); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
    .btn-block { width: 100%; }
    .btn-icon { width: 48px; height: 48px; padding: 0; border-radius: 50%; font-size: 20px; }

    /* Cards */
    .card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      transition: all var(--ease);
    }
    .card:hover { background: var(--surface-hover); }
    .card-padding { padding: 16px; }
    .card-gap { display: flex; flex-direction: column; gap: 12px; }

    /* Menu card (home screen) */
    .menu-card {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px;
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      cursor: pointer;
      transition: all var(--ease);
    }
    .menu-card:hover, .menu-card:active {
      background: var(--surface-hover);
      transform: translateX(4px);
    }
    .menu-icon {
      width: 48px; height: 48px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .menu-icon.teal { background: var(--teal-glow); }
    .menu-icon.amber { background: var(--amber-glow); }
    .menu-icon.purple { background: rgba(168,85,247,0.2); }
    .menu-icon.blue { background: rgba(59,130,246,0.2); }
    .menu-text { flex: 1; }
    .menu-text h3 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
    .menu-text p { font-size: 13px; color: var(--text-muted); }
    .menu-arrow { color: var(--text-dim); font-size: 18px; }

    /* Swipe card */
    .swipe-container {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 8px 16px 4px;
      position: relative; overflow: hidden;
    }
    .swipe-stack { position: relative; width: 100%; max-width: 400px; aspect-ratio: 3/5; }
    .swipe-card {
      position: absolute; inset: 0;
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
      display: flex; flex-direction: column;
      cursor: grab;
      touch-action: none;
      transition: box-shadow 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .swipe-card.dragging { transition: none; cursor: grabbing; }
    .swipe-card-image {
      height: 50%; background: var(--surface); position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .swipe-card-image img { width: 100%; height: 100%; object-fit: cover; }
    .swipe-card-image .no-photo { font-size: 48px; opacity: 0.3; }
    .swipe-card-body {
      flex: 1; padding: 12px 16px 10px;
      display: flex; flex-direction: column; gap: 4px; overflow-y: auto;
    }
    .swipe-card-body .provider-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: var(--text-muted);
    }
    .swipe-card-body .provider-row .badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 10px; flex-shrink: 0;
    }
    .swipe-card-body .provider-row .badge.verified { background: rgba(59,130,246,0.25); color: #60a5fa; }
    .swipe-card-body .provider-row .badge.tested { background: rgba(245,158,11,0.25); color: var(--amber); }
    .swipe-card-body .provider-row .badge.likes { background: rgba(20,184,166,0.18); color: var(--teal); }
    .swipe-card-body .provider-row .swipe-likes { margin-left: auto; font-size: 12px; color: var(--text-dim); }
    .swipe-card-body h2 { font-size: 18px; font-weight: 700; line-height: 1.2; }
    .swipe-card-body .category-tag {
      display: inline-block; padding: 2px 8px;
      background: var(--teal-glow); color: var(--teal);
      border-radius: var(--radius-pill); font-size: 11px; font-weight: 600;
      align-self: flex-start;
    }
    .swipe-card-body .price-table {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .swipe-card-body .price-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .swipe-card-body .price-row .label { color: var(--text-muted); font-weight: 500; }
    .swipe-card-body .price-row .amount { color: var(--amber); font-weight: 700; }
    .swipe-card-body .city-row {
      font-size: 12px; color: var(--text-dim);
      display: flex; align-items: center; gap: 4px;
    }
    .swipe-indicator {
      position: absolute; top: 20px; left: 20px; right: 20px;
      display: flex; justify-content: space-between; pointer-events: none;
      opacity: 0; transition: opacity 0.2s ease;
    }
    .swipe-indicator.show { opacity: 1; }
    .swipe-indicator .like-badge, .swipe-indicator .nope-badge {
      padding: 8px 18px; border-radius: var(--radius-sm);
      font-size: 36px; line-height: 1;
      transform: rotate(-15deg);
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .swipe-indicator .like-badge { transform: rotate(-15deg); }
    .swipe-indicator .nope-badge { transform: rotate(15deg); }

    /* Contact status row */
    .contact-status-row {
      margin-top: auto; padding: 8px 10px; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 600; text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .contact-status-row.pending { background: rgba(245,158,11,0.15); color: var(--amber); }
    .contact-status-row.provider { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .contact-status-row.approved { background: rgba(20,184,166,0.15); color: var(--teal); }
    .contact-status-row.rejected { background: rgba(239,68,68,0.15); color: var(--red); }

    /* Contact result screen (after like) */
    .contact-result {
      flex: 1; display: flex; flex-direction: column;
      padding: 24px 20px; text-align: center;
      align-items: center; justify-content: center; gap: 16px;
    }
    .contact-result .result-icon { font-size: 48px; }
    .contact-result h3 { font-size: 18px; font-weight: 700; }
    .contact-result .result-msg { font-size: 14px; color: var(--text-muted); max-width: 300px; line-height: 1.5; }
    .contact-result .contact-value {
      padding: 12px 20px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-card); font-size: 16px; font-weight: 600;
      display: flex; align-items: center; gap: 10px;
    }

    /* Swipe actions */
    .swipe-actions {
      display: flex; justify-content: center; gap: 32px;
      padding: 8px 16px 16px; flex-shrink: 0;
    }
    .swipe-actions .btn { width: 64px; height: 64px; border-radius: 50%; font-size: 28px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .swipe-actions .btn-nope { background: rgba(239,68,68,0.2); color: var(--red); border: 2px solid var(--red); }
    .swipe-actions .btn-nope:active { background: rgba(239,68,68,0.4); }
    .swipe-actions .btn-like { background: rgba(20,184,166,0.2); color: var(--teal); border: 2px solid var(--teal); }
    .swipe-actions .btn-like:active { background: rgba(20,184,166,0.4); }
    .swipe-actions .btn-continue {
      width: auto; padding: 14px 32px; border-radius: var(--radius-pill);
      font-size: 16px; font-weight: 700;
    }
    .swipe-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center; gap: 12px;
    }
    .swipe-empty .empty-icon { font-size: 48px; opacity: 0.3; }
    .swipe-empty h3 { font-size: 18px; font-weight: 600; }
    .swipe-empty p { color: var(--text-muted); font-size: 14px; max-width: 280px; }

    /* Card detail (full screen) */
    .detail-scroll { padding: 0 0 calc(24px + var(--safe-bottom)); }
    .detail-carousel {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: var(--surface); overflow: hidden;
      touch-action: pan-y;
    }
    .detail-carousel-inner {
      display: flex; height: 100%;
      transition: transform 0.3s ease;
    }
    .detail-carousel-inner.dragging { transition: none; }
    .detail-carousel-slide {
      flex: 0 0 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .detail-carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
    .detail-carousel-slide .no-photo { font-size: 48px; opacity: 0.2; }
    .detail-carousel-dots {
      position: absolute; bottom: 10px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 6px;
    }
    .detail-carousel-dots .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.3); transition: background 0.2s ease;
    }
    .detail-carousel-dots .dot.active { background: var(--teal); }
    .detail-body { padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
    .detail-body h1 { font-size: 22px; font-weight: 700; }
    .detail-body .detail-provider {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; font-weight: 600; color: var(--text-muted);
    }
    .detail-body .detail-provider .badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 50%; font-size: 10px;
    }
    .detail-body .detail-provider .badge.verified { background: rgba(59,130,246,0.25); color: #60a5fa; }
    .detail-body .detail-provider .badge.tested { background: rgba(245,158,11,0.25); color: var(--amber); }
    .detail-body .detail-provider .badge.likes { background: rgba(20,184,166,0.18); color: var(--teal); }
    .detail-category {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; background: var(--teal-glow); color: var(--teal);
      border-radius: var(--radius-pill); font-size: 13px; font-weight: 600;
      align-self: flex-start;
    }
    .detail-likes {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 13px; color: var(--text-dim); font-weight: 600;
    }
    .detail-price-table {
      display: flex; flex-direction: column; gap: 6px;
    }
    .detail-price-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
    }
    .detail-price-row .label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .detail-price-row .amount { font-size: 15px; font-weight: 700; color: var(--amber); }
    .detail-description { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
    .detail-location { font-size: 13px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
    .detail-contact-status {
      padding: 10px 14px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .detail-contact-status.pending { background: rgba(245,158,11,0.15); color: var(--amber); }
    .detail-contact-status.provider { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .detail-contact-status.approved { background: rgba(20,184,166,0.15); color: var(--teal); }
    .detail-contact-status.rejected { background: rgba(239,68,68,0.15); color: var(--red); }
    .detail-actions {
      display: flex; flex-direction: column; gap: 10px;
      padding: 16px; position: sticky; bottom: 0; background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .detail-actions .btn { width: 100%; justify-content: center; }

    /* Saved services */
    .saved-list { display: flex; flex-direction: column; gap: 14px; }
    .saved-card {
      overflow: hidden;
      background: var(--surface); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: var(--radius-card);
      cursor: pointer;
      transition: all var(--ease);
    }
    .saved-card:hover, .saved-card:active { background: var(--surface-hover); }
    .saved-card-image {
      width: 100%; aspect-ratio: 4/3;
      background: var(--surface); display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .saved-card-image img { width: 100%; height: 100%; object-fit: cover; }
    .saved-card-image .no-photo { font-size: 32px; opacity: 0.2; }
    .saved-card-body { padding: 12px; display: flex; flex-direction: column; gap: 7px; }
    .saved-provider {
      display: flex; align-items: center; gap: 5px; min-width: 0;
      font-size: 12px; color: var(--text-muted); font-weight: 700;
    }
    .saved-provider .badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%; font-size: 9px;
    }
    .saved-provider .badge.verified { background: rgba(59,130,246,0.25); color: #60a5fa; }
    .saved-provider .badge.tested { background: rgba(245,158,11,0.25); color: var(--amber); }
    .saved-provider .badge.likes { background: rgba(20,184,166,0.18); color: var(--teal); }
    .saved-card-body h4 {
      font-size: 16px; line-height: 1.2; font-weight: 700;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .saved-card-body .saved-category {
      width: fit-content; padding: 4px 9px; border-radius: 7px;
      font-size: 11px; color: var(--teal); font-weight: 700;
    }
    .saved-card-body .saved-bottom {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      margin-top: 2px;
    }
    .saved-card-body .saved-price { font-size: 13px; color: var(--amber); font-weight: 800; }
    .saved-card-body .saved-at { font-size: 11px; color: var(--text-dim); }
    .saved-card-actions {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding-top: 6px; border-top: 1px solid var(--border);
    }
    .saved-card-likes { font-size: 12px; color: var(--text-dim); font-weight: 700; }
    .saved-card-remove {
      min-height: 38px; border-radius: 8px; flex-shrink: 0;
      padding: 0 12px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(239,68,68,0.15); border: none; color: var(--red);
      font-size: 13px; font-weight: 800; cursor: pointer;
      transition: all var(--ease);
    }
    .saved-card-remove:hover, .saved-card-remove:active { background: rgba(239,68,68,0.3); }
    .saved-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .saved-empty .empty-icon { font-size: 40px; opacity: 0.3; margin-bottom: 12px; }

    /* My Service */
    .my-service-card {
      overflow: hidden;
      background: var(--surface); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: var(--radius-card);
      display: flex; flex-direction: column;
    }
    .my-service-image {
      width: 100%; aspect-ratio: 4/3; overflow: hidden;
      background: var(--surface); display: flex; align-items: center; justify-content: center;
    }
    .my-service-image img { width: 100%; height: 100%; object-fit: cover; }
    .my-service-image .no-photo { font-size: 34px; opacity: 0.22; }
    .my-service-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .my-service-title-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .my-service-card h2 { font-size: 20px; font-weight: 700; }
    .my-service-card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0; font-weight: 600; }
    .my-service-card .value { font-size: 14px; color: var(--text); }
    .my-service-card .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 600;
    }
    .my-service-card .status-badge.approved { background: rgba(20,184,166,0.2); color: var(--teal); }
    .my-service-card .status-badge.pending { background: rgba(245,158,11,0.2); color: var(--amber); }
    .my-service-card .status-badge.rejected { background: rgba(239,68,68,0.2); color: var(--red); }
    .my-service-card .divider { height: 1px; background: var(--border); margin: 4px 0; }
    .my-service-fields { display: grid; gap: 10px; }
    .service-state-note {
      padding: 12px 13px; border-radius: 8px; font-size: 13px; line-height: 1.5;
      border: 1px solid var(--border); background: rgba(255,255,255,0.055);
    }
    .service-state-note.pending { color: var(--amber); border-color: rgba(245,158,11,0.28); background: rgba(245,158,11,0.12); }
    .service-state-note.approved { color: var(--teal); border-color: rgba(20,184,166,0.28); background: rgba(20,184,166,0.12); }
    .service-state-note.rejected { color: var(--red); border-color: rgba(239,68,68,0.28); background: rgba(239,68,68,0.12); }
    .visibility-control {
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      padding: 12px 13px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.055);
    }
    .visibility-copy { min-width: 0; }
    .visibility-copy strong { display: block; font-size: 14px; }
    .visibility-copy span { display: block; font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .visibility-toggle {
      min-width: 76px; height: 38px; border-radius: 999px; border: 1px solid var(--border);
      display: inline-flex; align-items: center; justify-content: space-between; gap: 7px;
      padding: 4px 11px 4px 5px; color: var(--text-muted);
      background: rgba(255,255,255,0.08); font-weight: 800; cursor: pointer;
      transition: all var(--ease);
    }
    .visibility-toggle.on {
      color: #061014; background: linear-gradient(135deg, var(--teal), #34d399);
      border-color: rgba(255,255,255,0.2);
    }
    .visibility-dot {
      width: 28px; height: 28px; border-radius: 999px; background: currentColor;
      box-shadow: inset 0 0 0 7px rgba(255,255,255,0.78);
    }
    .visibility-toggle.on .visibility-dot { background: #061014; box-shadow: inset 0 0 0 7px rgba(255,255,255,0.92); }
    .rejection-box {
      display: flex; flex-direction: column; gap: 10px;
      padding: 12px 13px; border-radius: 8px;
      border: 1px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.12);
    }
    .rejection-box strong { color: var(--red); font-size: 13px; }
    .rejection-box p { color: var(--text-muted); font-size: 13px; line-height: 1.5; }
    .my-service-empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .my-service-empty .empty-icon { font-size: 40px; opacity: 0.3; margin-bottom: 12px; }

    /* Policy gate */
    .policy-screen { overflow-y: auto; padding: 24px 16px calc(24px + var(--safe-bottom)); }
    .policy-screen h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .policy-screen .policy-text {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-card); padding: 20px;
      font-size: 14px; color: var(--text-muted); line-height: 1.7;
      margin-bottom: 20px; white-space: pre-line;
    }
    .policy-screen .policy-actions { display: flex; flex-direction: column; gap: 12px; }

    /* Category filter */
    .category-filter {
      display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto;
      flex-shrink: 0; scrollbar-width: none; -ms-overflow-style: none;
    }
    .category-filter::-webkit-scrollbar { display: none; }
    .category-chip {
      padding: 6px 14px; border-radius: var(--radius-pill);
      background: var(--surface); border: 1px solid var(--border);
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      white-space: nowrap; cursor: pointer;
      transition: all var(--ease); flex-shrink: 0;
    }
    .category-chip:hover { background: var(--surface-hover); }
    .category-chip.active { background: var(--teal-glow); color: var(--teal); border-color: var(--teal); }

    /* Toast / notification */
    .toast {
      position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
      padding: 12px 20px; border-radius: var(--radius-pill);
      background: var(--surface); backdrop-filter: blur(12px);
      border: 1px solid var(--border); color: var(--text);
      font-size: 14px; font-weight: 500;
      z-index: 100; pointer-events: none;
      opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease;
      transform: translateX(-50%) translateY(20px);
      max-width: 90vw; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--teal); color: var(--teal); }
    .toast.error { border-color: var(--red); color: var(--red); }

    /* Usage bar */
    .usage-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; margin: 0 8px 4px;
      background: var(--surface); border-radius: var(--radius);
      font-size: 11px; font-weight: 500; gap: 8px;
      min-height: 28px; flex-shrink: 0;
    }
    .usage-bar .usage-left { display: flex; align-items: center; gap: 10px; }
    .usage-bar .usage-stat { display: flex; align-items: center; gap: 3px; opacity: 0.75; }
    .usage-bar .usage-stat.warn { opacity: 1; color: var(--yellow); }
    .usage-bar .usage-stat.danger { opacity: 1; color: var(--red); }
    .usage-bar .usage-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
    .usage-bar .usage-dot.green { background: var(--teal); }
    .usage-bar .usage-dot.amber { background: var(--yellow); }
    .usage-bar .usage-dot.red { background: var(--red); }
    .usage-bar .usage-countdown { font-variant-numeric: tabular-nums; }

    /* Usage limit modal */
    .usage-modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .usage-modal-backdrop.show { opacity: 1; pointer-events: auto; }
    .usage-modal {
      background: var(--surface); backdrop-filter: blur(16px);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 420px; padding: 24px 20px 28px;
      transform: translateY(100%); transition: transform 0.25s ease;
    }
    .usage-modal-backdrop.show .usage-modal { transform: translateY(0); }
    .usage-modal h3 { margin: 0 0 6px; font-size: 17px; font-weight: 600; }
    .usage-modal .usage-modal-sub { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; }
    .usage-modal .usage-detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .usage-modal .usage-detail-row:last-child { border: none; }
    .usage-modal .usage-detail-label { opacity: 0.7; }
    .usage-modal .usage-detail-value { font-weight: 600; }
    .usage-modal .usage-countdown-large {
      font-size: 28px; font-weight: 700; text-align: center;
      padding: 12px 0 4px; font-variant-numeric: tabular-nums;
    }
    .usage-modal .usage-countdown-label { text-align: center; font-size: 12px; opacity: 0.5; margin-bottom: 12px; }
    .usage-modal .btn { width: 100%; margin-top: 12px; }

    /* Error screen */
    .error-screen {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center; gap: 16px;
    }
    .error-screen .error-icon { font-size: 48px; opacity: 0.3; }
    .error-screen h3 { font-size: 18px; font-weight: 600; }
    .error-screen p { color: var(--text-muted); font-size: 14px; max-width: 300px; }

      padding: 12px 14px calc(14px + var(--safe-bottom));
      background: rgba(7,10,15,0.78);
      border-top-color: rgba(167,185,203,0.14);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      backdrop-filter: blur(18px) saturate(1.2);
    }
    html.light .detail-actions {
      background: rgba(246,248,251,0.82);
    }
    .saved-card {
      padding: 0;
    }
    .saved-card-image {
      background:
        linear-gradient(135deg, rgba(28,199,182,0.12), rgba(114,167,255,0.1)),
        rgba(255,255,255,0.05);
    }
    .saved-card-body h4 {
      font-weight: 800;
    }
    .saved-card-remove {
      background: rgba(240,91,98,0.12);
      border-radius: 8px;
    }
    .my-service-card {
      padding: 0;
    }
    .my-service-card .label {
      color: var(--text-dim);
      letter-spacing: 0;
    }
    .my-service-card .status-badge {
      border-radius: 7px;
      border: 1px solid currentColor;
    }
    .policy-screen .policy-text {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.045));
      border-color: rgba(167,185,203,0.14);
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
    }
    .toast {
      bottom: calc(76px + var(--safe-bottom));
      background: rgba(13,18,25,0.9);
      border-color: rgba(167,185,203,0.18);
      border-radius: 8px;
      box-shadow: var(--shadow-md);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      backdrop-filter: blur(16px) saturate(1.2);
    }
    html.light .toast {
      background: rgba(255,255,255,0.95);
    }
    .toast.success {
      background: linear-gradient(135deg, rgba(28,199,182,0.18), rgba(83,216,145,0.12));
    }
    .toast.error {
      background: linear-gradient(135deg, rgba(240,91,98,0.18), rgba(255,122,120,0.1));
    }
    .budget-sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      background: rgba(3, 7, 12, 0.58);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }
    .budget-sheet-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }
    .budget-sheet {
      width: min(100%, 500px);
      padding: 18px;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(19, 26, 35, 0.98), rgba(12, 17, 24, 0.98));
      border: 1px solid rgba(167, 185, 203, 0.16);
      box-shadow: var(--shadow-lg);
      transform: translateY(18px);
      transition: transform 180ms ease;
    }
    html.light .budget-sheet {
      background: linear-gradient(180deg, rgba(255,255,255,0.99), rgba(244,248,252,0.98));
      border-color: rgba(20,30,44,0.12);
    }
    .budget-sheet-backdrop.show .budget-sheet {
      transform: translateY(0);
    }
    .budget-sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .budget-sheet-title {
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
    }
    .budget-sheet-close {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
    }
    .budget-field-label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 800;
    }
    .budget-input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font: 800 18px/1 var(--font);
      outline: none;
    }
    html.light .budget-input {
      background: rgba(255,255,255,0.94);
    }
    .budget-input:focus {
      border-color: rgba(28,199,182,0.7);
      box-shadow: 0 0 0 3px rgba(28,199,182,0.14);
    }
    .budget-average,
    .budget-error {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.5;
    }
    .budget-average {
      color: var(--text-muted);
    }
    .budget-error {
      color: var(--red);
      min-height: 20px;
      font-weight: 800;
    }
    .budget-sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 10px;
      margin-top: 16px;
    }
    .location-inline-prompt {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(244, 182, 77, 0.32);
      border-radius: 8px;
      background: rgba(244, 182, 77, 0.1);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }
    .location-inline-prompt a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 900;
    }
    .provider-row .badge,
    .detail-provider .badge {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .swipe-card-body .provider-row .badge {
      width: 22px; height: 22px; font-size: 12px;
    }
    .provider-row .badge.verified,
    .detail-provider .badge.verified {
      color: #60a5fa;
      background: rgba(59,130,246,0.25);
      box-shadow: 0 0 10px rgba(59,130,246,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .provider-row .badge.tested,
    .detail-provider .badge.tested {
      color: var(--amber);
      background: rgba(245,158,11,0.25);
      box-shadow: 0 0 10px rgba(245,158,11,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .provider-row .badge.likes,
    .detail-provider .badge.likes {
      width: auto; min-width: 22px; padding: 0 5px;
      border-radius: 11px; font-size: 11px;
      background: rgba(20,184,166,0.20);
      color: var(--teal);
      box-shadow: 0 0 8px rgba(20,184,166,0.18);
    }
    @media (min-width: 720px) {
      #app {
        max-width: 520px;
        margin: 0 auto;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        box-shadow: var(--shadow-lg);
      }
    }
    @media (max-height: 700px) {
      .swipe-card-image {
        height: 50%;
      }
      .swipe-card-body h2 {
        font-size: 19px;
      }
      .swipe-actions .btn {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast"></div>
  <div id="usageModalBackdrop" class="usage-modal-backdrop">
    <div class="usage-modal">
      <h3 id="usageModalTitle">Contact Limit Reached</h3>
      <div id="usageModalSub" class="usage-modal-sub"></div>
      <div id="usageModalDetails"></div>
      <button class="btn btn-primary" id="usageModalCloseBtn">Got it</button>
    </div>
  </div>
  <script>
    (function () {
      'use strict';

      /* ── state ─────────────────────────────────── */
      const state = {
        screen: 'loading',
        user: null,
        token: null,
        services: [],
        currentIndex: 0,
        filters: { category_id: null },
        savedServices: [],
        categories: [],
        myService: null,
        usageInfo: null,
      };

      const API_BASE = '';
      let toastTimer = null;

      /* ── Telegram WebApp ──────────────────────── */
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation();
        const root = document.documentElement;
        if (tg.colorScheme === 'light') root.classList.remove('dark');
        else root.classList.add('dark');
      }

      /* ── helpers ────────────────────────────────── */
      function $(sel) { return document.querySelector(sel); }
      function $$(sel) { return document.querySelectorAll(sel); }

      function getBotUsername() {
        const meta = document.querySelector('meta[name="bot-username"]');
        return meta ? meta.getAttribute('content') : '';
      }

      function getBotDeepLink(startParam) {
        const botUsername = getBotUsername().replace(/^@/, '');
        if (!botUsername) return null;
        return 'https://t.me/' + botUsername + (startParam ? '?start=' + encodeURIComponent(startParam) : '');
      }

      function qs(key) {
        const p = new URLSearchParams(window.location.search);
        return p.get(key);
      }

      function getApiBase() {
        const origin = window.location.origin;
        return origin + '/api';
      }

      function fetchApi(path, opts = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (state.token) headers['Authorization'] = 'Token ' + state.token;
        const url = getApiBase() + path;
        return fetch(url, { ...opts, headers })
          .then(r => r.json())
          .catch(err => ({ success: false, error: err.message || 'Network error' }));
      }

      function showToast(msg, type) {
        const el = document.getElementById('toast');
        if (!el) return;
        if (toastTimer) { clearTimeout(toastTimer); el.classList.remove('show'); }
        el.textContent = msg;
        el.className = 'toast' + (type ? ' ' + type : '');
        requestAnimationFrame(() => { el.classList.add('show'); });
        toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3000);
      }

      function renderUsageBar(usage) {
        const el = document.getElementById('usageBar');
        if (!el) return;
        if (!usage) {
          el.innerHTML = ''; el.style.display = 'none';
          return;
        }
        const today = usage.requests_today || 0;
        const daily = usage.daily_hard_limit || Infinity;
        const weekly = usage.weekly_requests || 0;
        const weeklyCap = usage.weekly_hard_limit || Infinity;
        const retry = usage.retry_after_seconds || 0;
        const pct = Math.min(today / Math.max(daily, 1), 1);
        const dotClass = pct >= 1 ? 'red' : pct >= 0.75 ? 'amber' : 'green';

        let countdownHtml = '';
        if (retry > 0) {
          countdownHtml = '<span class="usage-countdown" data-retry="' + retry + '" data-ts="' + Date.now() + '">'
            + formatCountdown(retry) + '</span>';
        }

        el.style.display = 'flex';
        el.innerHTML =
          '<span class="usage-dot ' + dotClass + '"></span>'
          + '<div class="usage-left">'
          + '<span class="usage-stat' + (today >= daily ? ' danger' : today >= daily * 0.75 ? ' warn' : '') + '">'
          + '<span>📞</span> ' + today + '/' + daily + ' today'
          + '</span>'
          + '<span class="usage-stat' + (weekly >= weeklyCap ? ' danger' : '') + '">'
          + weekly + '/' + (weeklyCap === Infinity ? '∞' : weeklyCap) + ' week'
          + '</span>'
          + '</div>'
          + (countdownHtml ? '<span>' + countdownHtml + '</span>' : '');

        if (retry > 0) startCountdownTicker(el);
      }

      function formatCountdown(sec) {
        if (sec <= 0) return '';
        if (sec < 60) return sec + 's';
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return m + ':' + (s < 10 ? '0' : '') + s;
      }

      function startCountdownTicker(container) {
        if (container._countdownTimer) return;
        container._countdownTimer = setInterval(() => {
          const el = container.querySelector('.usage-countdown');
          if (!el) { clearInterval(container._countdownTimer); container._countdownTimer = null; return; }
          const elapsed = Math.floor((Date.now() - parseInt(el.dataset.ts)) / 1000);
          const remaining = Math.max(0, parseInt(el.dataset.retry) - elapsed);
          if (remaining <= 0) {
            el.textContent = 'now';
            clearInterval(container._countdownTimer);
            container._countdownTimer = null;
          } else {
            el.textContent = formatCountdown(remaining);
          }
        }, 1000);
      }

      function showUsageLimitModal(usage) {
        const backdrop = document.getElementById('usageModalBackdrop');
        if (!backdrop || !usage) return;
        const titleEl = document.getElementById('usageModalTitle');
        const subEl = document.getElementById('usageModalSub');
        const detailsEl = document.getElementById('usageModalDetails');

        const pct = usage.protection_level;
        const today = usage.requests_today || 0;
        const daily = usage.daily_hard_limit || Infinity;
        const weekly = usage.weekly_requests || 0;
        const weeklyCap = usage.weekly_hard_limit || Infinity;
        const retry = usage.retry_after_seconds || 0;

        if (pct === 'weekly_lock') {
          titleEl.textContent = 'Weekly Limit Reached';
          subEl.textContent = 'You\'ve used all available contact requests for this week.';
        } else if (today >= daily) {
          titleEl.textContent = 'Daily Limit Reached';
          subEl.textContent = 'You\'ve hit the maximum daily contact requests. Check back tomorrow.';
        } else if (retry > 0) {
          titleEl.textContent = 'Pacing Cooldown Active';
          subEl.textContent = 'Slow down! Take a short break between contact requests.';
        } else {
          titleEl.textContent = 'Contact Limit Reached';
          subEl.textContent = usage.message || '';
        }

        let html = '';
        html += '<div class="usage-detail-row"><span class="usage-detail-label">Today</span><span class="usage-detail-value">' + today + ' / ' + daily + '</span></div>';
        html += '<div class="usage-detail-row"><span class="usage-detail-label">This Week</span><span class="usage-detail-value">' + weekly + ' / ' + (weeklyCap === Infinity ? '∞' : weeklyCap) + '</span></div>';

        if (retry > 0) {
          html += '<div class="usage-countdown-large" id="modalCountdown">' + formatCountdown(retry) + '</div>';
          html += '<div class="usage-countdown-label">until next request</div>';
          html += '<div class="usage-detail-row"><span class="usage-detail-label">Protection Level</span><span class="usage-detail-value" style="text-transform:capitalize">' + (pct || 'paced') + '</span></div>';

          const endTs = Date.now() + retry * 1000;
          if (backdrop._modalTimer) clearInterval(backdrop._modalTimer);
          backdrop._modalTimer = setInterval(() => {
            const cdEl = document.getElementById('modalCountdown');
            if (!cdEl) { clearInterval(backdrop._modalTimer); return; }
            const remaining = Math.max(0, Math.floor((endTs - Date.now()) / 1000));
            cdEl.textContent = formatCountdown(remaining);
            if (remaining <= 0) {
              cdEl.textContent = 'Now';
              clearInterval(backdrop._modalTimer);
            }
          }, 1000);
        }

        detailsEl.innerHTML = html;
        backdrop.classList.add('show');
      }

      function closeUsageLimitModal(event) {
        if (event && event.target !== event.currentTarget) return;
        const backdrop = document.getElementById('usageModalBackdrop');
        if (!backdrop) return;
        backdrop.classList.remove('show');
        if (backdrop._modalTimer) { clearInterval(backdrop._modalTimer); backdrop._modalTimer = null; }
      }

      function closeBudgetSheet() {
        const backdrop = document.getElementById('budgetSheetBackdrop');
        if (!backdrop) return;
        backdrop.classList.remove('show');
        setTimeout(() => backdrop.remove(), 180);
      }

      function formatAverageAmount(amount) {
        return amount || '-';
      }

      function renderAverageLine(svc, averages, loading) {
        const categoryName = svc.category ? svc.category.name : 'this service';
        if (loading) return 'Loading average prices...';
        return 'Average price for ' + categoryName + ': '
          + formatAverageAmount(averages.half_day) + ' / '
          + formatAverageAmount(averages.full_day) + ' / '
          + formatAverageAmount(averages.night) + ' ETB.';
      }

      function formatPrice(price) {
        const labels = { half_day: 'Half Day', full_day: 'Full Day', night: 'Night' };
        return (labels[price.price_type] || price.price_type) + ': ' + price.amount + ' ETB';
      }

      function getPhotoUrl(photos) {
        if (!photos || photos.length === 0) return null;
        const sorted = [...photos].sort((a, b) => a.order_index - b.order_index);
        return getPhotoSrc(sorted[0]);
      }

      function getPhotoSrc(photo) {
        if (!photo) return null;
        if (photo.url) return photo.url;
        if (photo.photo_url) return photo.photo_url;
        if (photo.id) return getApiBase() + '/service/photo/' + encodeURIComponent(photo.id) + '/';
        if (photo.telegram_file_id && /^https?:\/\//i.test(photo.telegram_file_id)) {
          return photo.telegram_file_id;
        }
        return null;
      }

      function renderImageOrPlaceholder(photo) {
        const src = getPhotoSrc(photo);
        const img = src
          ? `<img src="${escHtml(src)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : '';
        return img + `<div class="no-photo" style="display:${src ? 'none' : 'flex'}">📷</div>`;
      }

      function getLikesBadge(likesCount) {
        const count = Number(likesCount || 0);
        if (count >= 151) return '🔥';
        if (count >= 71) return '💫';
        if (count >= 31) return '🌟';
        if (count >= 11) return '😃';
        if (count >= 1) return '😊';
        return '';
      }

      function serviceIsVerified(svc) {
        return Boolean(svc && (svc.is_verified || svc.provider_is_verified));
      }

      function serviceIsTested(svc) {
        return Boolean(svc && (svc.admin_tested_badge || svc.provider_admin_tested_badge));
      }

      function renderProviderBadges(svc) {
        const parts = [];
        const likesBadge = getLikesBadge(svc && svc.likes_count);
        if (likesBadge) {
          parts.push(`<span class="badge likes" title="${escHtml((svc.likes_count || 0) + ' likes')}">${likesBadge}</span>`);
        }
        if (serviceIsVerified(svc)) {
          parts.push('<span class="badge verified" title="Verified by admin">✓</span>');
        }
        if (serviceIsTested(svc)) {
          parts.push('<span class="badge tested" title="Tested by admin">⭐</span>');
        }
        return parts.join('');
      }

      function contactValueFromRequest(cr) {
        if (!cr || !cr.contact_visible || !cr.provider_contact) return null;
        return cr.provider_contact;
      }

      function buildTelegramContactLink(providerContact, serviceTitle) {
        if (!providerContact) return null;
        const hasTelegram = providerContact.telegram_username;
        const isPhone = providerContact.contact_type === 'secondary_phone_number';
        const botName = getBotUsername().replace(/^@/, '') || 'Leomatchbot';
        const myName = state.user ? (state.user.display_name || state.user.first_name || 'Someone') : 'Someone';

        let telegramLink = null;
        if (hasTelegram) {
          const username = hasTelegram.replace(/^@/, '');
          const text = `Hi! I found you on ${botName}${serviceTitle ? ' for "' + serviceTitle + '"' : ''}. I'm ${myName}. Let's connect!`;
          telegramLink = {
            type: 'telegram',
            url: 'https://t.me/' + encodeURIComponent(username) + '?text=' + encodeURIComponent(text),
            display: '@' + username,
          };
        }

        if (isPhone && hasTelegram) {
          return { type: 'both', phone: providerContact.contact_value, telegram: telegramLink };
        }
        if (isPhone) {
          return { type: 'phone', display: providerContact.contact_value };
        }
        return telegramLink || { type: 'phone', display: providerContact.contact_value };
      }

      function contactStatusLabel(status, contactInfo) {
        switch (status) {
          case 'provider_pending':
            return { cls: 'provider', label: '⏳ Waiting for provider...' };
          case 'pending':
            return { cls: 'pending', label: '⏳ Admin reviewing...' };
          case 'approved':
          case 'auto_approved':
            if (contactInfo && contactInfo.type === 'both') {
              const phone = escHtml(contactInfo.phone);
              const tg = contactInfo.telegram;
              return {
                cls: 'approved link',
                html: '<div style="display:flex;flex-direction:column;gap:6px">'
                  + '<span style="font-weight:600">📞 ' + phone + '</span>'
                  + '<a href="' + escHtml(tg.url) + '" target="_blank" rel="noopener" style="color:var(--teal);text-decoration:none;font-weight:700;display:flex;align-items:center;gap:6px">💬 Contact ' + escHtml(tg.display) + ' →</a>'
                  + '</div>'
              };
            }
            if (contactInfo && contactInfo.url) {
              return {
                cls: 'approved link',
                html: '<a href="' + escHtml(contactInfo.url) + '" target="_blank" rel="noopener" style="color:var(--teal);text-decoration:none;font-weight:700;display:flex;align-items:center;gap:6px">💬 Contact ' + escHtml(contactInfo.display) + ' →</a>'
              };
            }
            return { cls: 'approved', label: contactInfo && contactInfo.display ? '✅ Contact: ' + contactInfo.display : '✅ Contact approved!' };
          case 'rejected':
          case 'provider_rejected':
            return { cls: 'rejected', label: '❌ Not available. Try another provider.' };
          default:
            return { cls: '', label: '' };
        }
      }

      function renderContactStatusRow(contactStatus) {
        if (!contactStatus) return '';
        const status = contactStatusLabel(contactStatus.status, contactStatus.contact_value);
        if (!status.label && !status.html) return '';
        if (status.html) return '<div class="contact-status-row ' + status.cls + '">' + status.html + '</div>';
        return '<div class="contact-status-row ' + status.cls + '">' + escHtml(status.label) + '</div>';
      }

      function buildDiscoveryQuery(extra) {
        const params = new URLSearchParams();
        if (state.filters.category_id) params.set('category_id', state.filters.category_id);
        Object.entries(extra || {}).forEach(([key, value]) => {
          if (value !== null && value !== undefined && value !== '') params.set(key, value);
        });
        const query = params.toString();
        return query ? '?' + query : '';
      }

      /* ── render: app container ─────────────────── */
      function renderApp(html) {
        document.getElementById('app').innerHTML = html;
      }

      /* ── render: loading ────────────────────────── */
      function renderLoading() {
        renderApp(`
          <div class="screen active loading-screen">
            <div class="spinner"></div>
            <div class="loading-text">Loading Marketplace...</div>
          </div>
        `);
      }

      /* ── render: error ──────────────────────────── */
      function renderError(msg) {
        renderApp(`
          <div class="screen active error-screen">
            <div class="error-icon">⚠️</div>
            <h3>Something went wrong</h3>
            <p>${msg || 'An unexpected error occurred.'}</p>
            <button class="btn btn-secondary" onclick="location.reload()">Try Again</button>
          </div>
        `);
      }

      /* ── render: policy gate ────────────────────── */
      function renderPolicyGate() {
        const botUsername = getBotUsername().replace(/^@/, '');
        const deepLink = botUsername ? 'https://t.me/' + botUsername + '?start=policy' : null;
        renderApp(`
          <div class="screen active policy-screen">
            <div style="text-align:center;padding:40px 0 20px;font-size:48px">📋</div>
            <h1>Policy Required</h1>
            <p style="color:var(--text-muted);margin-bottom:24px;font-size:14px;line-height:1.6;">
              To use this marketplace, please open the bot and complete the policy review.
            </p>
            <div class="policy-actions">
              ${deepLink ? `<a class="btn btn-primary btn-block" href="${deepLink}" target="_blank">📱 Open Bot</a>` : '<button class="btn btn-secondary btn-block" disabled>Bot username not configured</button>'}
            </div>
          </div>
        `);
      }

      function userCanManageService() {
        const role = state.user && state.user.role;
        return role === 'provider' || role === 'both';
      }

      function serviceStatusLabel(status) {

      function loadSwipeServices(showLoading) {
        const container = document.getElementById('swipeContent');
        if (showLoading && container) {
          container.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner" style="margin:0 auto"></div></div>';
        }
        const actions = document.getElementById('swipeActions');
        fetchApi('/discovery/swipe/' + buildDiscoveryQuery())
          .then(res => {
            state.usageInfo = res.provider_protection || null;
            renderUsageBar(state.usageInfo);
            if (res.success && res.card) {
              state.services = [res.card];
              state.currentIndex = 0;
              state._swipeNextCard = null;
              renderSwipeContent();
              prefetchNextCard();
            } else if (res.error === 'LOCATION_REQUIRED') {
              state.services = [];
              if (container) {
                container.innerHTML = `
                  <div class="swipe-empty">
                    <div class="empty-icon">📍</div>
                    <h3>Location needed</h3>
                    <p>Share your GPS location to find nearby providers.</p>
                    <button class="btn btn-primary" onclick="requestLocationFromMiniApp()" style="margin-top:8px">📍 Share GPS Location</button>
                    <div id="locationError" style="color:var(--color-danger);margin-top:6px;font-size:13px;display:none"></div>
                  </div>
                `;
              }
              if (actions) actions.innerHTML = '';
            } else {
              state.services = [];
              renderSwipeContent();
            }
          })
          .catch(() => {
            state.services = [];
            renderSwipeContent();
          });

        const current = state.services[state.currentIndex];
        const query = buildDiscoveryQuery(
          current ? { exclude_service_id: current.id } : {}

        fetchApi('/discovery/swipe/' + query)
          .then(res => {
            if (res.provider_protection) {
              state.usageInfo = res.provider_protection;
              renderUsageBar(state.usageInfo);
            }
            if (res.success && res.card) {
              state._swipeNextCard = res.card;
            }
          })
          .catch(() => {});

          container.innerHTML = `
            <div class="swipe-empty">
              <div class="empty-icon">🎉</div>
              <h3>You've seen everyone!</h3>
              <p>No more providers in your area right now. Check back soon for new listings.</p>
              <button class="btn btn-primary" onclick="window.app.loadSwipeServices(true)" style="margin-top:8px">🔄 Refresh</button>
            </div>

      function renderContactResult(container, actions) {
        const cr = state.contactResult;
        let icon, title, msg, contactHtml = '';

        switch (cr.status) {
          case 'provider_pending':
            icon = '⏳'; title = 'Request Sent!';

            msg = 'Your request is being reviewed by the admin team.';
            break;

          case 'auto_approved':
            icon = '✅'; title = 'Contact Approved!';
            msg = 'The provider\'s contact information is now available.';
            if (cr.contact_value && cr.contact_value.type === 'both') {
              contactHtml = '<div class="contact-value" style="display:flex;flex-direction:column;gap:6px">'
                + '<span>📞 ' + escHtml(cr.contact_value.phone) + '</span>'
                + '<a href="' + escHtml(cr.contact_value.telegram.url) + '" target="_blank" rel="noopener" style="color:var(--teal);text-decoration:none;font-weight:700">💬 ' + escHtml(cr.contact_value.telegram.display) + ' →</a>'
                + '</div>';
            } else if (cr.contact_value) {
              contactHtml = '<div class="contact-value">📞 ' + escHtml(cr.contact_value.display || cr.contact_value) + '</div>';

        container.innerHTML = `

      function changeSwipePhoto(dir) {
        const card = document.getElementById('swipeCard');
        if (!card) return;
        const total = card.querySelectorAll('[id^="swipePhotoSlide"]').length;
        if (total < 2) return;
        let idx = parseInt(card.dataset.photoIndex || '0', 10);
        const oldIdx = idx;
        idx = (idx + dir + total) % total;
        card.dataset.photoIndex = idx;
        const prev = document.getElementById('swipePhotoSlide' + oldIdx);
        const next = document.getElementById('swipePhotoSlide' + idx);
        if (prev) { prev.style.opacity = '0'; prev.style.pointerEvents = 'none'; }
        if (next) { next.style.opacity = '1'; next.style.pointerEvents = 'auto'; }
        const dots = document.getElementById('swipePhotoDots');
        if (dots) {
          const spans = dots.querySelectorAll('span');
          spans.forEach((s, i) => s.classList.toggle('active', i === idx));
        }
      }

      function initSwipeCard() {
        const card = document.getElementById('swipeCard');
        if (!card) return;

        let startX = 0, startY = 0, currentX = 0, isDragging = false;
        const threshold = 120;

        function onStart(x, y, target) {
          if (target && (target.closest('#swipePhotoPrev') || target.closest('#swipePhotoNext'))) {
            return;
          }
          startX = x; startY = y; currentX = 0;
          isDragging = true;
          card.classList.add('dragging');
          const ind = document.getElementById('swipeIndicator');
          if (ind) ind.classList.remove('show');
        }

        function onMove(x, y) {
          if (!isDragging) return;
          currentX = x - startX;
          const rot = Math.max(-30, Math.min(30, currentX / 10));
          card.style.transform = `translateX(${currentX}px) rotate(${rot}deg)`;
          const ind = document.getElementById('swipeIndicator');
          if (ind) {
            ind.classList.add('show');
            const like = ind.querySelector('.like-badge');
            const nope = ind.querySelector('.nope-badge');
            if (like && nope) {
              like.style.opacity = Math.max(0, Math.min(1, currentX / 150));
              nope.style.opacity = Math.max(0, Math.min(1, -currentX / 150));
            }
          }
        }

        function onEnd() {
          if (!isDragging) return;
          isDragging = false;
          card.classList.remove('dragging');
          const ind = document.getElementById('swipeIndicator');
          if (ind) ind.classList.remove('show');

          if (Math.abs(currentX) > threshold) {
            const dir = currentX > 0 ? 'right' : 'left';
            const tx = currentX > 0 ? window.innerWidth + 100 : -(window.innerWidth + 100);
            card.style.transition = 'transform 0.35s ease';
            card.style.transform = `translateX(${tx}px) rotate(${currentX > 0 ? 30 : -30}deg)`;
            setTimeout(() => {
              if (dir === 'right') swipeAction('like');
              else swipeAction('dislike');
            }, 350);
          } else {
            card.style.transition = 'transform 0.3s ease';
            card.style.transform = 'translateX(0) rotate(0)';
            setTimeout(() => { card.style.transition = ''; }, 300);
          }
        }

        card.addEventListener('touchstart', e => { const t = e.touches[0]; onStart(t.clientX, t.clientY, e.target); }, { passive: true });
        card.addEventListener('touchmove', e => { const t = e.touches[0]; onMove(t.clientX, t.clientY); }, { passive: true });
        card.addEventListener('touchend', onEnd, { passive: true });
        card.addEventListener('mousedown', e => { onStart(e.clientX, e.clientY, e.target); });
        document.addEventListener('mousemove', e => { onMove(e.clientX, e.clientY); });
        document.addEventListener('mouseup', onEnd);
      }

      function swipeAction(action) {
        const svc = state.services[state.currentIndex];
        if (!svc || state._swipeBusy) return;
        state._swipeBusy = true;

        if (action === 'like') {
          fetchApi('/swipe/like/', { method: 'POST', body: JSON.stringify({ service_id: svc.id }) })
            .then(res => {
              state._swipeBusy = false;
              if (res.provider_protection) {
                state.usageInfo = res.provider_protection;
                renderUsageBar(state.usageInfo);
              }
              if (res.success) {
                const cr = res.contact_request || {};
                svc.likes_count = Number(svc.likes_count || 0) + 1;
                const providerContact = contactValueFromRequest(cr);
                svc._contactStatus = {
                  status: cr.status || 'approved',
                  contact_value: providerContact ? buildTelegramContactLink(providerContact, svc.title) : null,
                };
                renderSwipeContent();
                showContactResultToast(svc._contactStatus);
              } else if (res.error && res.error.includes('Providers cannot send')) {
                showToast('👋 Browse freely! As a provider, explore other listings. Contact requests are for customers.', 'info');
                advanceToNextCard();
              } else if (res.error && res.provider_protection) {
                showUsageLimitModal(res.provider_protection);
                advanceToNextCard();
              } else {
                showToast(res.error || 'Failed to like', 'error');
                advanceToNextCard();
              }
            })
            .catch(() => {
              state._swipeBusy = false;
              showToast('Network error', 'error');
              advanceToNextCard();
            });
        } else if (action === 'dislike') {
          fetchApi('/swipe/dislike/', { method: 'POST', body: JSON.stringify({ service_id: svc.id }) })
            .then(res => {
              state._swipeBusy = false;
              if (!res.success && res.error) showToast(res.error, 'error');
            })
            .catch(() => { state._swipeBusy = false; });
          advanceToNextCard();
        } else if (action === 'pass') {
          fetchApi('/swipe/dislike/', { method: 'POST', body: JSON.stringify({ service_id: svc.id }) })
            .catch(() => {});
          const card = document.getElementById('swipeCard');
          if (card) {
            card.style.transition = 'transform 0.35s ease';
            card.style.transform = `translateX(-${window.innerWidth + 100}px) rotate(-30deg)`;
            setTimeout(() => {
              state._swipeBusy = false;
              advanceToNextCard();
            }, 350);
          } else {
            state._swipeBusy = false;
            advanceToNextCard();
          }
        }
      }

      function showContactResultToast(cr) {
        switch (cr.status) {
          case 'provider_pending':
            showToast('✅ Request sent! Waiting for provider response.', 'success');
            break;
          case 'approved':
          case 'auto_approved':
            showToast('✅ Contact approved!', 'success');
            break;
          case 'rejected':
          case 'provider_rejected':
            showToast('❌ Not available. Try another provider.', 'error');
            break;
          default:
            showToast('✅ Done!', 'success');
        }
      }

      function advanceToNextCard() {
        if (state._swipeNextCard) {
          state.services = [state._swipeNextCard];
          state.currentIndex = 0;
          state._swipeNextCard = null;
          renderSwipeContent();
          prefetchNextCard();
        } else {
          loadSwipeServices(false);
        }
      }

      function continueSwiping() {
        state.contactResult = null;
        state._swipeBusy = false;
        advanceToNextCard();
      }

            <div class="detail-actions">
